dataset_overrides:
  institution_id: NCC
  nominal_resolution: 200 km
  source_id: NorESM3

variables:

  albisccp_tavg-u-hxy-cl:
    description: Time-means are weighted by the ISCCP Total Cloud Fraction - see  https://www.cfmip.org/tools-and-data/cosp.
      Values will be missing where there are no clouds or no sunlight.
    dims: [lon, lat, time]
    formula: MEANCLDALB_ISCCP/CLDTOT_ISCCP
    sources: [model_var: MEANCLDALB_ISCCP, model_var: CLDTOT_ISCCP]
    table: atmos
    units: '1'

  aod550volso4_tavg-u-hxy-u:
    description: This is the monthly averaged aerosol optical thickness at 550 nm
      due to stratospheric volcanic sulphate aerosols
    dims: [lon, lat, time, lambda550nm]
    sources: [model_var: AODVVOLC]
    table: atmos
    units: '1.00E-09'

  areacella_ti-u-hxy-u:
    description: Cell areas for any grid used to report atmospheric variables and
      any other variable using that grid (e.g., soil moisture content). These cell
      areas should be defined to enable exact calculation of global integrals (e.g.,
      of vertical fluxes of energy at the surface and top of the atmosphere).
    dims: [lon, lat]
    sources: [model_var: area]
    table: atmos
    units: m2

  bldep_tavg-u-hxy-u:
    description: Boundary layer depth
    dims: [lon, lat, time]
    sources: [model_var: PBLH]
    table: atmos
    units: m

  cfadDbze94_tavg-h40-hxy-air:
    description: CloudSat Radar Reflectivity
    dims: [lon, lat, alt40, dbze, time]
    sources: [model_var: CFAD_DBZE94_CS]
    table: atmos
    units: '1'

  cfadLidarsr532_tavg-h40-hxy-air:
    description: CALIPSO Scattering Ratio
    dims: [lon, lat, alt40, scatratio, time]
    sources: [model_var: CFAD_SR532_CAL]
    table: atmos
    units: '1'

  cl_tavg-al-hxy-u:
    description: Percentage cloud cover, including both large-scale and convective
      cloud.
    dims: [lon, lat, lev, time]
    levels: {name: standard_hybrid_sigma, src_axis_bnds: ilev, src_axis_name: lev,
      units: '1'}
    sources: [model_var: CLOUD]
    table: atmos
    units: '%'

  clcalipso_tavg-220hPa-hxy-air:
    description: Percentage cloud cover in layer centred on 220hPa
    dims: [lon, lat, time, p220]
    sources: [model_var: CLDHGH_CAL]
    table: atmos
    units: '%'

  clcalipso_tavg-560hPa-hxy-air:
    description: Percentage cloud cover in layer centred on 560hPa
    dims: [lon, lat, time, p560]
    sources: [model_var: CLDMED_CAL]
    table: atmos
    units: '%'

  cli_tavg-al-hxy-u:
    description: Includes both large-scale and convective cloud.  This is calculated
      as the mass of cloud ice in the grid cell divided by the mass of air (including
      the water in all phases) in the grid cell. It includes precipitating hydrometeors
      ONLY if the precipitating hydrometeors affect the calculation of radiative transfer
      in model.
    dims: [lon, lat, lev, time]
    levels: {name: standard_hybrid_sigma, src_axis_bnds: ilev, src_axis_name: lev,
      units: '1'}
    sources: [model_var: CLDICE]
    table: atmos
    units: kg kg-1

  clisccp_tavg-p7c-hxy-air:
    description: Percentage cloud cover in optical depth categories.
    dims: [time, plev, lat, lon, tau]
    levels: {name: plev7c, units: Pa}
    sources: [model_var: FISCCP1_COSP]
    table: atmos
    units: '%'

  clivi_tavg-u-hxy-u:
    description: Ice water path
    dims: [lon, lat, time]
    sources: [model_var: TGCLDIWP]
    table: atmos
    units: kg m-2

  clt_tavg-u-hxy-u:
    description: for the whole atmospheric column, as seen from the surface or the
      top of the atmosphere. Include both large-scale and convective cloud.
    dims: [lon, lat, time]
    formula: CLDTOT*100
    sources: [model_var: CLDTOT]
    table: atmos
    units: '%'

  cltc_tavg-u-hxy-u:
    description: Convective cloud fraction
    dims: [lon, lat, time]
    formula: CONCLD*100
    sources: [model_var: CONCLD]
    table: atmos
    units: '%'

  cltisccp_tavg-u-hxy-u:
    description: Total cloud area fraction (reported as a percentage) for the whole
      atmospheric column, as seen by the International Satellite Cloud Climatology
      Project (ISCCP) analysis. Includes both large-scale and convective cloud.  (MODIS).
      Includes both large-scale and convective cloud.
    dims: [lon, lat, time]
    sources: [model_var: CLDTOT_ISCCP]
    table: atmos
    units: '%'

  clw_tavg-al-hxy-u:
    description: Includes both large-scale and convective cloud.  Calculate as the
      mass of cloud liquid water in the grid cell divided by the mass of air (including
      the water in all phases) in the grid cells. Precipitating hydrometeors are included
      ONLY if the precipitating hydrometeors affect the calculation of radiative transfer
      in model.
    dims: [lon, lat, lev, time]
    levels: {name: standard_hybrid_sigma, src_axis_bnds: ilev, src_axis_name: lev,
      units: '1'}
    sources: [model_var: CLDLIQ]
    table: atmos
    units: kg kg-1

  clwmodis_tavg-u-hxy-u:
    description: MODIS Liquid Cloud Fraction
    dims: [lon, lat, time]
    sources: [model_var: CLWMODIS]
    table: atmos
    units: '%'

  evspsbl_tavg-u-hxy-lnd:
    description: 'Evaporation at surface (also known as evapotranspiration): flux
      of water into the atmosphere due to conversion of both liquid and solid phases
      to vapor (from underlying surface and vegetation)'
    dims: [lon, lat, time]
    formula: QVEGT+QVEGE+QSOIL
    sources: [model_var: QVEGT, model_var: QVEGE, model_var: QSOIL]
    table: atmos
    units: kg m-2 s-1

  hfls_tavg-u-hxy-is:
    description: The surface called "surface" means the lower boundary of the atmosphere.
      "Upward" indicates a vector component which is positive when directed upward
      (negative downward). The surface latent heat flux is the exchange of heat between
      the surface and the air on account of evaporation (including sublimation). In
      accordance with common usage in geophysical disciplines, "flux" implies per
      unit area, called "flux density" in physics.
    dims: [lon, lat, time]
    sources: [model_var: LHFLX]
    table: atmos
    units: W m-2

  hfls_tavg-u-hxy-u:
    description: This is the 3-hour mean flux.
    dims: [lon, lat, time]
    positive: up
    sources: [model_var: LHFLX]
    table: atmos
    units: W m-2

  hfss_tavg-u-hxy-is:
    description: The surface sensible heat flux, also called turbulent heat flux,
      is the exchange of heat between the surface and the air by motion of air.
    dims: [lon, lat, time]
    sources: [model_var: SHFLX]
    table: atmos
    units: W m-2

  hfss_tavg-u-hxy-u:
    description: The surface sensible heat flux, also called turbulent heat flux,
      is the exchange of heat between the surface and the air by motion of air.
    dims: [lon, lat, time]
    positive: up
    sources: [model_var: SHFLX]
    table: atmos
    units: W m-2

  hur_tavg-al-hxy-u:
    description: The relative humidity with respect to liquid water for T> 0 C, and
      with respect to ice for T<0 C.
    dims: [lon, lat, lev, time]
    levels: {name: standard_hybrid_sigma, src_axis_bnds: ilev, src_axis_name: lev,
      units: '1'}
    sources: [model_var: RELHUM, model_var: RHW]
    table: atmos
    units: '%'

  hur_tavg-p19-hxy-air:
    description: This is the relative humidity with respect to liquid water for T>
      0 C, and with respect to ice for T<0 C.
    dims: [time, plev, lat, lon]
    levels: {name: plev19, units: Pa}
    sources: [model_var: RELHUM, model_var: RHW]
    table: atmos
    units: '%'

  hur_tavg-p19-hxy-u:
    description: This is the relative humidity with respect to liquid water for T>
      0 C, and with respect to ice for T<0 C.
    dims: [time, plev, lat, lon]
    levels: {name: plev19, units: Pa}
    sources: [model_var: RELHUM, model_var: RHW]
    table: atmos
    units: '%'

  hurs_tavg-h2m-hxy-u:
    description: This is the relative humidity with respect to liquid water for T>
      0 C, and with respect to ice for T<0 C.
    dims: [lon, lat, time, height2m]
    sources: [model_var: RHREFHT]
    table: atmos
    units: '%'

  hurs_tmax-h2m-hxy-u:
    description: This is the relative humidity with respect to liquid water for T>
      0 C, and with respect to ice for T<0 C.
    dims: [lon, lat, time, height2m]
    sources: [{model_var: 'RHREFHT:X'}]
    table: atmos
    units: '%'

  hurs_tmin-h2m-hxy-u:
    description: This is the relative humidity with respect to liquid water for T>
      0 C, and with respect to ice for T<0 C.
    dims: [lon, lat, time, height2m]
    sources: [{model_var: 'RHREFHT:M'}]
    table: atmos
    units: '%'

  hus_tavg-al-hxy-u:
    description: Specific humidity is the mass fraction of water vapor in (moist)
      air.
    dims: [lon, lat, lev, time]
    levels: {name: standard_hybrid_sigma, src_axis_bnds: ilev, src_axis_name: lev,
      units: '1'}
    sources: [model_var: Q]
    table: atmos
    units: '1'

  hus_tavg-p19-hxy-u:
    description: Specific humidity is the mass fraction of water vapor in (moist)
      air.
    dims: [time, plev, lat, lon]
    levels: {name: plev19, units: Pa}
    sources: [model_var: Q]
    table: atmos
    units: '1'

  huss_tavg-h2m-hxy-u:
    description: Near-surface (usually, 2 meter) specific humidity.
    dims: [lon, lat, time, height2m]
    sources: [model_var: QREFHT]
    table: atmos
    units: '1'

  loadbc_tavg-u-hxy-u:
    description: The total dry mass of black carbon aerosol particles per unit area.
    dims: [lon, lat, time]
    formula: BC_A+BC_AC+BC_AI+BC_AX+BC_N+BC_NI
    sources: [model_var: BC_A, model_var: BC_AC, model_var: BC_AI, model_var: BC_AX,
      model_var: BC_N, model_var: BC_NI]
    table: atmos
    units: kg m-2

  loadso4_tavg-u-hxy-u:
    description: The total dry mass of sulfate aerosol particles per unit area.
    dims: [lon, lat, time]
    formula: SO4_A1*3+SO4_A2*3+SO4_AC*3+SO4_N*3+SO4_NA*3+SO4_PR*3
    sources: [model_var: SO4_A1, model_var: SO4_A2, model_var: SO4_AC, model_var: SO4_N,
      model_var: SO4_NA, model_var: SO4_PR]
    table: atmos
    units: kg m-2

  pctisccp_tavg-u-hxy-cl:
    description: time-means are weighted by the ISCCP Total Cloud Fraction - see  https://www.cfmip.org/tools-and-data/cosp
    dims: [lon, lat, time]
    formula: MEANPTOP_ISCCP/CLDTOT_ISCCP
    sources: [model_var: MEANPTOP_ISCCP, model_var: CLDTOT_ISCCP]
    table: atmos
    units: Pa

  pr_tavg-u-hxy-u:
    description: at surface; includes both liquid and solid phases from all types
      of clouds (both large-scale and convective)
    dims: [lon, lat, time]
    formula: PRECT+PRECC
    sources: [model_var: PRECT, model_var: PRECC]
    table: atmos
    units: kg m-2 s-1

  prc_tavg-u-hxy-u:
    description: at surface; includes both liquid and solid phases.
    dims: [lon, lat, time]
    sources: [model_var: PRECC]
    table: atmos
    units: kg m-2 s-1

  prra_tavg-u-hxy-lnd:
    description: rainfall_flux
    dims: [lon, lat, time]
    formula: PRECT-PRECSC-PRECSL
    sources: [model_var: PRECT, model_var: PRECSC, model_var: PRECSL]
    table: atmos
    units: kg m-2 s-1

  prra_tavg-u-hxy-u:
    description: 'Rainfall rate at surface: Includes precipitation of all forms of
      water in the liquid phase'
    dims: [lon, lat, time]
    formula: PRECT-PRECSC-PRECSL
    sources: [model_var: PRECT, model_var: PRECSC, model_var: PRECSL]
    table: atmos
    units: kg m-2 s-1

  prsn_tavg-u-hxy-is:
    description: quantity averaged over ice sheet (grounded ice sheet and floating
      ice shelf) only. Needed to analyse the impact of downscaling methods
    dims: [lon, lat, time]
    formula: PRECSC+PRECSL
    sources: [model_var: PRECSC, model_var: PRECSL]
    table: atmos
    units: kg m-2 s-1

  prsn_tavg-u-hxy-u:
    description: at surface.  Includes precipitation of all forms water in the solid
      phase.  This is the 3-hour mean snowfall flux.
    dims: [lon, lat, time]
    formula: PRECSC+PRECSL
    sources: [model_var: PRECSC, model_var: PRECSL]
    table: atmos
    units: kg m-2 s-1

  ps_tavg-u-hxy-u:
    description: surface pressure (not mean sea-level pressure), 2-D field to calculate
      the 3-D pressure field from hybrid coordinates
    dims: [lon, lat, time]
    sources: [model_var: PS]
    table: atmos
    units: Pa

  psl_tavg-u-hxy-u:
    description: Sea Level Pressure
    dims: [lon, lat, time]
    sources: [model_var: PSL]
    table: atmos
    units: Pa

  ptp_tavg-u-hxy-u:
    description: 2D monthly mean thermal tropopause calculated using WMO tropopause
      definition on 3d temperature
    dims: [lon, lat, time]
    sources: [model_var: TROP_P]
    table: atmos
    units: Pa

  rld_tavg-alh-hxy-u:
    description: Includes also the fluxes at the surface and TOA.
    dims: [lon, lat, alevhalf, time]
    sources: [model_var: FDL]
    table: atmos
    units: W m-2

  rldcs_tavg-alh-hxy-u:
    description: Includes also the fluxes at the surface and TOA.
    dims: [lon, lat, alevhalf, time]
    sources: [model_var: FDLC]
    table: atmos
    units: W m-2

  rlds_tavg-u-hxy-u:
    description: Surface downwelling longwave radiation
    dims: [lon, lat, time]
    positive: up
    sources: [model_var: FLDS]
    table: atmos
    units: W m-2

  rldscs_tavg-u-hxy-u:
    description: Surface downwelling clear-sky longwave radiation
    dims: [lon, lat, time]
    sources: [model_var: FLDSC]
    table: atmos
    units: W m-2

  rls_tavg-u-hxy-u:
    description: Net longwave surface radiation
    dims: [lon, lat, time]
    positive: up
    sources: [model_var: FLNS]
    table: atmos
    units: W m-2

  rlu_tavg-alh-hxy-u:
    description: Includes also the fluxes at the surface and TOA.
    dims: [lon, lat, alevhalf, time]
    sources: [model_var: FUL]
    table: atmos
    units: W m-2

  rlucs_tavg-alh-hxy-u:
    description: Includes also the fluxes at the surface and TOA.
    dims: [lon, lat, alevhalf, time]
    sources: [model_var: FULC]
    table: atmos
    units: W m-2

  rlus_tavg-u-hxy-u:
    description: This is the 3-hour mean flux.
    dims: [lon, lat, time]
    formula: FLDS+FLNS
    positive: up
    sources: [model_var: FLDS, model_var: FLNS]
    table: atmos
    units: W m-2

  rluscs_tavg-u-hxy-u:
    description: Surface Upwelling Clear-sky Longwave Radiation
    dims: [lon, lat, time]
    sources: [model_var: FULC]
    table: atmos
    units: W m-2

  rlut_tavg-u-hxy-u:
    description: TOA outgoing longwave radiation
    dims: [lon, lat, time]
    formula: FSNTOA-FSNT+FLNT
    positive: up
    sources: [model_var: FSNTOA, model_var: FSNT, model_var: FLNT]
    table: atmos
    units: W m-2

  rsd_tavg-alh-hxy-u:
    description: Includes also the fluxes at the surface and TOA.
    dims: [lon, lat, alevhalf, time]
    sources: [model_var: FDS]
    table: atmos
    units: W m-2

  rsds_tavg-u-hxy-u:
    description: Hourly downward solar radiation flux at the surface
    dims: [lon, lat, time]
    positive: up
    sources: [model_var: FSDS]
    table: atmos
    units: W m-2

  rss_tavg-u-hxy-u:
    description: Net downward shortwave radiation at the surface
    dims: [lon, lat, time]
    positive: down
    sources: [model_var: FSNS]
    table: atmos
    units: W m-2

  rsus_tavg-u-hxy-is:
    description: The surface called "surface" means the lower boundary of the atmosphere.
      "shortwave" means shortwave radiation. Upwelling radiation is radiation from
      below. It does not mean "net upward". When thought of as being incident on a
      surface, a radiative flux is sometimes called "irradiance". In addition, it
      is identical with the quantity measured by a cosine-collector light-meter and
      sometimes called "vector irradiance". In accordance with common usage in geophysical
      disciplines, "flux" implies per unit area, called "flux density" in physics.
    dims: [lon, lat, time]
    sources: [model_var: FSR]
    table: atmos
    units: W m-2

  rsus_tavg-u-hxy-u:
    description: The surface called "surface" means the lower boundary of the atmosphere.
      "shortwave" means shortwave radiation. Upwelling radiation is radiation from
      below. It does not mean "net upward". When thought of as being incident on a
      surface, a radiative flux is sometimes called "irradiance". In addition, it
      is identical with the quantity measured by a cosine-collector light-meter and
      sometimes called "vector irradiance". In accordance with common usage in geophysical
      disciplines, "flux" implies per unit area, called "flux density" in physics.
    dims: [lon, lat, time]
    positive: up
    sources: [model_var: FSR]
    table: atmos
    units: W m-2

  rsuscs_tavg-u-hxy-u:
    description: Surface Upwelling Clear-sky Shortwave Radiation
    dims: [lon, lat, time]
    formula: FSDSC-FSNSC
    positive: up
    sources: [model_var: FSDSC, model_var: FSNSC]
    table: atmos
    units: W m-2

  rsut_tavg-u-hxy-u:
    description: TOA outgoing shortwave radiation
    dims: [lon, lat, time]
    positive: up
    sources: [model_var: FSUTOA]
    table: atmos
    units: W m-2

  rsutcs_tavg-u-hxy-u:
    description: TOA outgoing clear sky shortwave
    dims: [lon, lat, time]
    formula: SOLIN-FSNTOAC
    positive: up
    sources: [model_var: SOLIN, model_var: FSNTOAC]
    table: atmos
    units: W m-2

  sfcWind_tavg-h10m-hxy-u:
    description: This is the mean of the speed, not the speed computed from the mean
      u and v components of wind
    dims: [lon, lat, time, height10m]
    sources: [model_var: U10]
    table: atmos
    units: m s-1

  ta_tavg-700hPa-hxy-air:
    description: Air temperature at 700hPa
    dims: [lon, lat, time, p700]
    sources: [model_var: T700]
    table: atmos
    units: K

  ta_tavg-850hPa-hxy-air:
    description: Air temperature at 850hPa
    dims: [lon, lat, time, p850]
    sources: [model_var: T850]
    table: atmos
    units: K

  ta_tavg-p39-hy-air:
    description: Air Temperature
    dims: [time, plev, lat]
    levels: {name: plev39, units: Pa}
    sources: [model_var: T]
    table: atmos
    units: K

  tas_tmin-h2m-hxy-u:
    description: 'minimum near-surface (usually, 2 meter) air temperature (add cell_method
      attribute "time: min")'
    dims: [lon, lat, time, height2m]
    sources: [model_var: TREFMNAV]
    table: atmos
    units: K

  tauu_tavg-u-hxy-u:
    description: Downward eastward wind stress at the surface
    dims: [lon, lat, time]
    positive: down
    sources: [model_var: TAUX]
    table: atmos
    units: Pa

  tntrl_tavg-al-hxy-u:
    description: longwave heating rates
    dims: [lon, lat, lev, time]
    levels: {name: standard_hybrid_sigma, src_axis_bnds: ilev, src_axis_name: lev,
      units: '1'}
    sources: [model_var: QRL]
    table: atmos
    units: K s-1

  tntrl_tavg-p39-hy-air:
    description: zonal mean; hence YZT
    dims: [time, plev, lat]
    levels: {name: plev39, units: Pa}
    sources: [model_var: QRL]
    table: atmos
    units: K s-1

  ts_tavg-u-hxy-is:
    description: quantity averaged over ice sheet (grounded ice sheet and floating
      ice shelf) only. Needed to analyse the impact of downscaling methods
    dims: [lon, lat, time]
    sources: [model_var: TS]
    table: atmos
    units: K

  ts_tavg-u-hxy-u:
    description: Surface temperature (skin for open ocean)
    dims: [lon, lat, time]
    sources: [model_var: TS]
    table: atmos
    units: K

  ua_tavg-al-hxy-u:
    description: Zonal wind (positive in a eastward direction).
    dims: [lon, lat, lev, time]
    levels: {name: standard_hybrid_sigma, src_axis_bnds: ilev, src_axis_name: lev,
      units: '1'}
    sources: [model_var: U]
    table: atmos
    units: m s-1

  ua_tavg-p19-hxy-air:
    description: Zonal wind (positive in a eastward direction).
    dims: [time, plev, lat, lon]
    levels: {name: plev19, units: Pa}
    sources: [model_var: U]
    table: atmos
    units: m s-1

  ua_tavg-p39-hy-air:
    description: zonal mean; hence YZT
    dims: [time, plev, lat]
    levels: {name: plev39, units: Pa}
    sources: [model_var: U]
    table: atmos
    units: m s-1

  zg_tavg-p39-hy-air:
    description: Geopotential is the sum of the specific gravitational potential energy
      relative to the geoid and the specific centripetal potential energy. Geopotential
      height is the geopotential divided by the standard acceleration due to gravity.
      It is numerically similar to the altitude (or geometric height) and not to the
      quantity with standard name height, which is relative to the surface.
    dims: [time, plev, lat]
    levels: {name: plev39, units: Pa}
    sources: [model_var: Z3]
    table: atmos
    units: m

  ztp_tavg-u-hxy-u:
    description: 2D monthly mean thermal tropopause calculated using WMO tropopause
      definition on 3d temperature
    dims: [lon, lat, time]
    sources: [model_var: TROP_Z]
    table: atmos
    units: m
