dataset_overrides: {institution_id: NCAR, nominal_resolution: 100 km, source_id: CESM3}

variables:

  agessc_tavg-ol-hxy-sea:
    dims: [time, olevel, latitude, longitude]
    long_name: Ideal Age of Sea Water
    sources: [model_var: agessc]
    table: ocean
    units: yr

  cLitter_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    formula: (TOTLITC + CWD_C)/1000.0
    sources: [model_var: TOTLITC, model_var: CWD_C]
    table: land
    units: kg m-2

  cProduct_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    formula: (TOTPRODC + CWD_P)/1000.0
    sources: [model_var: TOTPRODC, model_var: CWD_P]
    table: land
    units: kg m-2
  cSoilFast:
    dims: [time, lat, lon]
    formula: (SOIL1C)/1000.0
    sources: [model_var: SOIL1C]
    table: land
    units: kg m-2
  cSoilMedium:
    dims: [time, lat, lon]
    formula: (SOIL2C)/1000.0
    sources: [model_var: SOIL2C]
    table: land
    units: kg m-2
  cSoilSlow:
    dims: [time, lat, lon]
    formula: (SOIL3C)/1000.0
    sources: [model_var: SOIL3C]
    table: land
    units: kg m-2

  cSoil_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    formula: (SOIL1C + SOIL2C + SOIL3C)/1000.0
    sources: [model_var: SOIL1C, model_var: SOIL2C, model_var: SOIL3C]
    table: land
    units: kg m-2

  cVeg_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    formula: (TOTVEGC)/1000.0
    sources: [model_var: TOTVEGC]
    table: land
    units: kg m-2

  cl_tavg-al-hxy-u:
    cell_methods: 'time: mean'
    dims: [time, lev, lat, lon]
    formula: CLOUD * 100
    levels: {name: standard_hybrid_sigma, src_axis_bnds: ilev, src_axis_name: lev,
      units: '1'}
    long_name: Cloud Area Fraction
    sources: [model_var: CLOUD]
    standard_name: cloud_area_fraction
    table: atmos
    units: '%'

  cli_tavg-al-hxy-u:
    dims: [time, lev, lat, lon]
    levels: {name: standard_hybrid_sigma, src_axis_bnds: ilev, src_axis_name: lev,
      units: '1'}
    sources: [model_var: CLDICE]
    table: atmos
    units: kg kg-1

  clivi_tavg-u-hxy-u:
    dims: [time, lat, lon]
    sources: [model_var: TGCLDIWP]
    table: atmos
    units: kg m-2

  clt_tavg-u-hxy-u:
    dims: [time, lat, lon]
    formula: CLDTOT * 100
    sources: [model_var: CLDTOT]
    table: atmos
    units: '%'

  clw_tavg-al-hxy-u:
    dims: [time, lev, lat, lon]
    levels: {name: standard_hybrid_sigma, src_axis_bnds: ilev, src_axis_name: lev,
      units: '1'}
    sources: [model_var: CLDLIQ]
    table: atmos
    units: kg kg-1

  clwvi_tavg-u-hxy-u:
    dims: [time, lat, lon]
    sources: [model_var: TGCLDLWP]
    table: atmos
    units: kg m-2

  cropFracC3_tavg-u-hxy-u:
    dims: [time, lat, lon]
    sources: [model_var: CROP_C3_FRAC]
    table: land
    units: '1'

  cropFracC4_tavg-u-hxy-u:
    dims: [time, lat, lon]
    sources: [model_var: CROP_C4_FRAC]
    table: land
    units: '1'

  dcw_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    sources: [model_var: DCW]
    table: land
    units: kg m-2

  deptho_ti-u-hxy-sea:
    dims: [yh, xh]
    long_name: Sea Floor Depth
    regrid_method: conservative
    sources: [model_var: deptho]
    standard_name: depth_below_sea_level
    table: fx
    units: m

  dgw_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    sources: [model_var: DGW]
    table: land
    units: kg m-2

  drivw_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    sources: [model_var: DRIVW]
    table: land
    units: kg m-2

  dslw_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    sources: [model_var: DSLW]
    table: land
    units: kg m-2

  dsn_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    sources: [model_var: DSN]
    table: land
    units: kg m-2

  dsw_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    sources: [model_var: DSW]
    table: land
    units: kg m-2

  esn_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    sources: [model_var: ESN]
    table: land
    units: kg m-2

  evspsbl_tavg-u-hxy-ifs:
    dims: [time, latitude, longitude]
    long_name: Evaporation over ice free ocean
    regrid_method: conservative
    sources: [model_var: evs]
    table: ocean
    units: kg m-2 s-1

  evspsbl_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    long_name: Evaporation over land
    sources: [model_var: QVEGT]
    table: land
    units: kg m-2 s-1

  evspsbl_tavg-u-hxy-u:
    cell_methods: 'time: mean'
    dims: [time, lat, lon]
    long_name: Evaporation
    regrid_method: conservative
    sources: [{model_var: QFLX, scale: -1.0}]
    table: atmos
    units: kg m-2 s-1

  evspsblpot_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    long_name: Potential Evaporation over Land
    sources: [model_var: QVEGT_POT]
    table: land
    units: kg m-2 s-1

  evspsblsoi_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    long_name: Water Evaporation from Soil
    sources: [model_var: QSOIL]
    table: land
    units: kg m-2 s-1

  evspsblsoi_tavg-u-hxy-u:
    dims: [time, lat, lon]
    long_name: Water Evaporation from Soil
    regrid_method: conservative
    sources: [{model_var: QSOIL, scale: -1.0}]
    table: atmos
    units: kg m-2 s-1

  evspsblveg_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    long_name: Water Evaporation from Vegetation
    sources: [model_var: QVEGE]
    table: land
    units: kg m-2 s-1

  evspsblveg_tavg-u-hxy-u:
    dims: [time, lat, lon]
    long_name: Water Evaporation from Vegetation
    regrid_method: conservative
    sources: [{model_var: QVEGE, scale: -1.0}]
    table: atmos
    units: kg m-2 s-1

  fFire_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    formula: COL_FIRE_CLOSS/1000.0
    positive: up
    sources: [model_var: COL_FIRE_CLOSS]
    table: land
    units: kg m-2 s-1
  fHarvest:
    dims: [time, lat, lon]
    formula: WOOD_HARVESTC/1000.0
    positive: up
    sources: [model_var: WOOD_HARVESTC]
    table: land
    units: kg m-2 s-1

  fNVegSoil_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    formula: NVEG_SOIL_CLOSS/1000.0
    positive: up
    sources: [model_var: NVEG_SOIL_CLOSS]
    table: land
    units: kg m-2 s-1

  ficeberg_tavg-u-hxy-sea:
    dims: [time, latitude, longitude]
    long_name: Iceberg Freshwater Flux
    regrid_method: conservative
    sources: [model_var: ficeberg]
    table: ocean
    units: kg m-2 s-1

  gpp_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    formula: GPP/1000.0
    sources: [model_var: GPP]
    table: land
    units: kg m-2 s-1

  hfds_tavg-u-hxy-sea:
    dims: [time, latitude, longitude]
    positive: down
    sources: [model_var: hfds]
    table: ocean
    units: W m-2

  hfls_tavg-u-hxy-u:
    dims: [time, lat, lon]
    positive: up
    sources: [model_var: LHFLX]
    table: atmos
    units: W m-2

  hfsnthermds_tavg-u-hxy-sea:
    dims: [time, olevel, latitude, longitude]
    long_name: Latent Heat to melt frozen Precipitation
    regrid_method: conservative
    sources: [model_var: hfsnthermds]
    table: ocean
    units: W m-2

  hfss_tavg-u-hxy-u:
    dims: [time, lat, lon]
    positive: up
    sources: [model_var: SHFLX]
    table: atmos
    units: W m-2

  hur_tavg-p19-hxy-air:
    dims: [time, plev, lat, lon]
    levels: {name: plev19, units: Pa}
    sources: [model_var: RELHUM]
    table: atmos
    units: '%'

  hurs_tavg-al-hxy-u:
    dims: [time, lev, lat, lon]
    levels: {name: standard_hybrid_sigma, src_axis_bnds: ilev, src_axis_name: lev,
      units: '1'}
    sources: [model_var: RELHUM]
    table: atmos
    units: '%'

  hurs_tavg-u-hxy-u:
    dims: [time, lat, lon]
    sources: [model_var: RHREFHT]
    table: atmos
    units: '%'

  hus_tavg-al-hxy-u:
    dims: [time, lev, lat, lon]
    levels: {name: standard_hybrid_sigma, src_axis_bnds: ilev, src_axis_name: lev,
      units: '1'}
    sources: [model_var: Q]
    table: atmos
    units: kg kg-1

  hus_tavg-p19-hxy-u:
    dims: [time, plev, lat, lon]
    levels: {name: plev19, units: Pa}
    sources: [model_var: Q]
    table: atmos
    units: kg kg-1

  huss_tavg-h2m-hxy-u:
    dims: [time, lat, lon]
    long_name: Near-Surface Specific Humidity
    regrid_method: bilinear
    sources: [model_var: QREFHT]
    table: atmos
    units: '1'

  irrDem_tavg-u-hxy-u:
    dims: [time, lat, lon]
    long_name: Irrigation Demand
    sources: [model_var: IRR_DEM]
    table: atmos
    units: kg m-2 s-1

  irrGw_tavg-u-hxy-u:
    dims: [time, lat, lon]
    long_name: Groundwater Irrigation
    sources: [model_var: IRR_GW]
    table: atmos
    units: kg m-2 s-1

  irrLut_tavg-u-hxy-u:
    dims: [time, lat, lon]
    long_name: Surface Water Irrigation
    sources: [model_var: IRR_LUT]
    table: atmos
    units: kg m-2 s-1

  irrSurf_tavg-u-hxy-u:
    dims: [time, lat, lon]
    long_name: Irrigation from Surface Water
    sources: [model_var: IRR_SURF]
    table: atmos
    units: kg m-2 s-1

  lai_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    sources: [model_var: TLAI]
    table: land
    units: '1'

  mlotst_tavg-u-hxy-sea:
    dims: [time, latitude, longitude]
    long_name: Ocean Mixed Layer Thickness Defined by Sigma T
    sources: [model_var: mlotst]
    table: ocean
    units: m

  mrfso_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    formula: verticalsum(SOILICE, capped_at=5000)
    sources: [model_var: SOILICE]
    table: landIce
    units: kg m-2

  mrro_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    sources: [model_var: QRUNOFF]
    table: land
    units: kg m-2 s-1

  mrrob_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    sources: [model_var: QBURDRUNOFF]
    table: land
    units: kg m-2 s-1

  mrros_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    sources: [model_var: QOVER]
    table: land
    units: kg m-2 s-1

  mrsfl_tavg-sl-hxy-lnd:
    dims: [time, sdepth, lat, lon]
    sources: [model_var: SOILMOIST]
    table: land
    units: kg m-2

  mrsll_tavg-sl-hxy-lnd:
    dims: [time, sdepth, lat, lon]
    sources: [model_var: SOILLIQ]
    table: land
    units: kg m-2

  mrso_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    formula: verticalsum(SOILICE + SOILLIQ, capped_at=5000)
    sources: [model_var: SOILICE, model_var: SOILLIQ]
    table: land
    units: kg m-2

  mrsol_tavg-d10cm-hxy-lnd:
    dims: [time, lat, lon]
    sources: [model_var: SOILWATER_10CM]
    table: land
    units: kg m-2

  mrsol_tavg-sl-hxy-lnd:
    dims: [time, sdepth, lat, lon]
    formula: SOILLIQ + SOILICE
    sources: [model_var: SOILLIQ, model_var: SOILICE]
    table: land
    units: kg m-2

  nVeg_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    formula: (WOOD_C + LEAF_C + ROOT_C)/1000.0
    sources: [model_var: WOOD_C, model_var: LEAF_C, model_var: ROOT_C]
    table: land
    units: kg m-2

  nbp_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    formula: NBP/1000.0
    positive: down
    sources: [model_var: NBP]
    table: land
    units: kg m-2 s-1

  npp_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    formula: NPP/1000.0
    positive: down
    sources: [model_var: NPP]
    table: land
    units: kg m-2 s-1

  pastureFracC3_tavg-u-hxy-u:
    dims: [time, lat, lon]
    sources: [model_var: PASTURE_C3_FRAC]
    table: land
    units: '1'

  pastureFracC4_tavg-u-hxy-u:
    dims: [time, lat, lon]
    sources: [model_var: PASTURE_C4_FRAC]
    table: land
    units: '1'

  pr_tavg-u-hxy-u:
    cell_methods: 'time: mean'
    dims: [time, lat, lon]
    long_name: Precipitation
    regrid_method: conservative
    sources: [{model_var: PRECT, scale: 1000.0}]
    standard_name: precipitation_flux
    table: atmos
    units: kg m-2 s-1

  prc_tavg-u-hxy-u:
    dims: [time, lat, lon]
    formula: PRECC * 1000.0
    sources: [model_var: PRECC]
    table: atmos
    units: kg m-2 s-1

  prsn_tavg-u-hxy-u:
    dims: [time, lat, lon]
    formula: (PRECSC + PRECSL) * 1000.0
    sources: [model_var: PRECSC, model_var: PRECSL]
    table: atmos
    units: kg m-2 s-1

  prveg_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    sources: [model_var: QINTR]
    table: land
    units: kg m-2 s-1

  prw_tavg-u-hxy-u:
    dims: [time, lat, lon]
    sources: [model_var: TMQ]
    table: atmos
    units: kg m-2

  ps_tavg-u-hxy-u:
    cell_methods: 'time: mean'
    dims: [time, lat, lon]
    long_name: Surface Air Pressure
    regrid_method: bilinear
    sources: [model_var: PS]
    table: atmos
    units: Pa

  psl_tavg-u-hxy-u:
    cell_methods: 'time: mean'
    dims: [time, lat, lon]
    long_name: Sea Level Pressure
    regrid_method: bilinear
    sources: [model_var: PSL]
    table: atmos
    units: Pa

  ra_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    formula: AR/1000.0
    positive: up
    sources: [model_var: AR]
    table: land
    units: kg m-2 s-1

  rh_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    formula: HR/1000.0
    positive: up
    sources: [model_var: HR]
    table: land
    units: kg m-2 s-1

  rlds_tavg-u-hxy-u:
    dims: [time, lat, lon]
    positive: up
    sources: [model_var: FLDS]
    table: atmos
    units: W m-2

  rldscs_tavg-u-hxy-u:
    dims: [time, lat, lon]
    formula: FLDS + FLNS - FLNSC
    positive: up
    sources: [model_var: FLDS, model_var: FLNS, model_var: FLNSC]
    table: atmos
    units: W m-2

  rlus_tavg-u-hxy-u:
    dims: [time, lat, lon]
    formula: FLDS + FLNS
    positive: up
    sources: [model_var: FLDS, model_var: FLNS]
    table: atmos
    units: W m-2

  rluscs_tavg-u-hxy-u:
    dims: [time, lat, lon]
    positive: up
    sources: [model_var: FLNSC]
    table: atmos
    units: W m-2

  rlut_tavg-u-hxy-u:
    dims: [time, lat, lon]
    positive: up
    sources: [model_var: FLUT]
    table: atmos
    units: W m-2

  rlutcs_tavg-u-hxy-u:
    dims: [time, lat, lon]
    positive: up
    sources: [model_var: FLUTC]
    table: atmos
    units: W m-2

  rsds_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    positive: up
    sources: [model_var: FSDS]
    table: land
    units: W m-2

  rsds_tavg-u-hxy-u:
    dims: [time, lat, lon]
    positive: up
    sources: [model_var: FSDS]
    table: atmos
    units: W m-2

  rsdscs_tavg-u-hxy-u:
    dims: [time, lat, lon]
    positive: up
    sources: [model_var: FSDSC]
    table: atmos
    units: W m-2

  rsdt_tavg-u-hxy-u:
    dims: [time, lat, lon]
    positive: up
    sources: [model_var: SOLIN]
    table: atmos
    units: W m-2

  rsus_tavg-u-hxy-u:
    dims: [time, lat, lon]
    formula: FSDS - FSNS
    positive: up
    sources: [model_var: FSDS, model_var: FSNS]
    table: atmos
    units: W m-2

  rsuscs_tavg-u-hxy-u:
    dims: [time, lat, lon]
    formula: FSDSC - FSNSC
    positive: up
    sources: [model_var: FSDSC, model_var: FSNSC]
    table: atmos
    units: W m-2

  rsut_tavg-u-hxy-u:
    dims: [time, lat, lon]
    positive: up
    sources: [model_var: FLUT]
    table: atmos
    units: W m-2

  rsutcs_tavg-u-hxy-u:
    dims: [time, lat, lon]
    formula: SOLIN - FSNTOAC
    positive: up
    sources: [model_var: SOLIN, model_var: FSNTOAC]
    table: atmos
    units: W m-2

  sfcWind_tavg-h10m-hxy-u:
    dims: [time, lat, lon]
    sources: [model_var: U10]
    table: atmos
    units: m s-1
  sftlf:
    dims: [lat, lon]
    formula: LANDFRAC * 100.0
    sources: [model_var: LANDFRAC]
    table: fx
    units: '%'

  siage_tavg-u-hxy-si:
    dims: [time, nj, ni]
    regrid_method: conservative
    sources: [{freq: day, model_var: siage_d}, {freq: mon, model_var: siage}]
    table: seaIce
    units: yr

  sialgc_tavg-u-hxy-si:
    dims: [time, nj, ni]
    regrid_method: conservative
    sources: [{freq: day, model_var: sialgc_d}, {freq: mon, model_var: sialgc}]
    table: seaIce
    units: kg m-2

  siarea_tavg-u-hm-u:
    dims: [time]
    sources: [{alias: siconc, freq: day, model_var: siconc_d}, {freq: mon, model_var: siconc},
      model_var: tarea]
    table: seaIce
    units: m2
    variants: [{formula: '(siconc * tarea / 100.).where(siconc.coords[''TLAT''] >
          0).sum(dim=[''nj'', ''ni''])', long_name: Sea Ice Area (Northern Hemisphere),
        region: nh}, {formula: '(siconc * tarea / 100.).where(siconc.coords[''TLAT'']
          < 0).sum(dim=[''nj'', ''ni''])', long_name: Sea Ice Area (Southern Hemisphere),
        region: sh}]

  siareaacrossline_tavg-u-ht-u:
    dims: [time, latitude]
    long_name: Sea Ice Area Across Line
    regrid_method: conservative
    sources: [{freq: day, model_var: siareaacrossline_d}, {freq: mon, model_var: siareaacrossline}]
    table: ocean
    units: m

  sichl_tavg-u-hxy-si:
    dims: [time, nj, ni]
    regrid_method: conservative
    sources: [{freq: day, model_var: sichl_d}, {freq: mon, model_var: sichl}]
    table: seaIce
    units: kg m-2

  sicompstren_tavg-u-hxy-si:
    dims: [time, nj, ni]
    regrid_method: conservative
    sources: [{freq: day, model_var: sicompstren_d}, {freq: mon, model_var: sicompstren}]
    table: seaIce
    units: N m-1

  siconc_tavg-u-hxy-si:
    dims: [time, nj, ni]
    regrid_method: conservative
    sources: [{freq: day, model_var: siconc_d}, {freq: mon, model_var: siconc}]
    table: seaIce
    units: '%'

  siconc_tavg-u-hxy-u:
    dims: [time, nj, ni]
    regrid_method: conservative
    sources: [{freq: day, model_var: siconc_d}, {freq: mon, model_var: siconc}]
    table: seaIce
    units: '%'

  siconca_tavg-u-hxy-u:
    dims: [time, nj, ni]
    regrid_method: conservative
    sources: [{freq: day, model_var: siconca_d}, {freq: mon, model_var: siconca}]
    table: seaIce
    units: '%'

  sidconcdyn_tavg-u-hxy-sea:
    dims: [time, nj, ni]
    long_name: Dynamic Sea Ice Concentration Change
    regrid_method: conservative
    sources: [{freq: day, model_var: sidconcdyn_d}, {freq: mon, model_var: sidconcdyn}]
    table: seaIce
    units: s-1

  sidconcth_tavg-u-hxy-sea:
    dims: [time, nj, ni]
    long_name: Sea Ice Concentration Change due to Thickness Changes
    regrid_method: conservative
    sources: [{freq: day, model_var: sidconcth_d}, {freq: mon, model_var: sidconcth}]
    table: seaIce
