# cesm_to_cmip7.yaml — CMIP-keyed schema with CMIP6 compatibility
#
# Top-level keys are CMIP variable names.
# Each variable can be defined either with:
#   - new-style 'sources' (preferred for complex/multi-source),
#   - or CMIP6-style 'raw_variables' + 'formula' (+ 'unit_conversion', 'levels', etc.).
#
# This allows direct reuse of CMIP6 tables while supporting newer expressive mappings.

dataset_overrides:
  institution_id: NCAR
  source_id: CESM3
  nominal_resolution: 100 km

variables:
  agessc_tavg-ol-hxy-sea:
    table: ocean
    long_name: "Ideal Age of Sea Water"
    units: "yr"
    dims: [time, olevel, latitude, longitude]
    sources:
      - model_var: agessc

  cl_tavg-al-hxy-u:
    table: atmos
    units: "%"
    long_name: Cloud Area Fraction
    standard_name: cloud_area_fraction
    cell_methods: "time: mean"
    dims: [time, lev, lat, lon]         # keep model levels
    formula: CLOUD * 100
    levels:
      name: standard_hybrid_sigma
      units: "1"
      src_axis_name: lev                 # model midlevel dimension
      src_axis_bnds: ilev                # model interface/bounds dim (if you ever need it)
    sources:
      - model_var: CLOUD

  cli_tavg-al-hxy-u:
    table: atmos
    units: "kg kg-1"
    dims: [time, lev, lat, lon]
    levels:
      name: standard_hybrid_sigma
      units: "1"
      src_axis_name: lev
      src_axis_bnds: ilev
    sources:
      - model_var: CLDICE

  cLitter_tavg-u-hxy-lnd:
    table: land
    units: "kg m-2"
    dims: [time, lat, lon]
    formula: (TOTLITC + CWD_C)/1000.0
    sources:
      - model_var: TOTLITC
      - model_var: CWD_C

  clivi_tavg-u-hxy-u:
    table: atmos
    units: "kg m-2"
    dims: [time, lat, lon]
    sources:
      - model_var: TGCLDIWP

  clt_tavg-u-hxy-u:
    table: atmos
    units: "%"
    dims: [time, lat, lon]
    formula: CLDTOT * 100
    sources:
      - model_var: CLDTOT

  clw_tavg-al-hxy-u:
    table: atmos
    units: "kg kg-1"
    dims: [time, lev, lat, lon]
    levels:
      name: standard_hybrid_sigma
      units: "1"
      src_axis_name: lev
      src_axis_bnds: ilev
    sources:
      - model_var: CLDLIQ

  clwvi_tavg-u-hxy-u:
    table: atmos
    units: "kg m-2"
    dims: [time, lat, lon]
    sources:
      - model_var: TGCLDLWP

  cProduct_tavg-u-hxy-lnd:
    table: land
    units: "kg m-2"
    dims: [time, lat, lon]
    formula: (TOTPRODC + CWD_P)/1000.0
    sources:
      - model_var: TOTPRODC
      - model_var: CWD_P

  cropFracC3_tavg-u-hxy-u:
    table: land
    units: "1"
    dims: [time, lat, lon]
    sources:
      - model_var: CROP_C3_FRAC

  cropFracC4_tavg-u-hxy-u:
    table: land
    units: "1"
    dims: [time, lat, lon]
    sources:
      - model_var: CROP_C4_FRAC

  cSoil_tavg-u-hxy-lnd:
    table: land
    units: "kg m-2"
    dims: [time, lat, lon]
    formula: (SOIL1C + SOIL2C + SOIL3C)/1000.0
    sources:
      - model_var: SOIL1C
      - model_var: SOIL2C
      - model_var: SOIL3C

  cSoilFast:
    table: land
    units: "kg m-2"
    dims: [time, lat, lon]
    formula: (SOIL1C)/1000.0
    sources:
      - model_var: SOIL1C

  cSoilMedium:
    table: land
    units: "kg m-2"
    dims: [time, lat, lon]
    formula: (SOIL2C)/1000.0
    sources:
      - model_var: SOIL2C

  cSoilSlow:
    table: land
    units: "kg m-2"
    dims: [time, lat, lon]
    formula: (SOIL3C)/1000.0
    sources:
      - model_var: SOIL3C

  cVeg_tavg-u-hxy-lnd:
    table: land
    units: "kg m-2"
    dims: [time, lat, lon]
    formula: (TOTVEGC)/1000.0
    sources:
      - model_var: TOTVEGC

  dcw_tavg-u-hxy-lnd:
    table: land
    units: "kg m-2"
    dims: [time, lat, lon]
    sources:
      - model_var: DCW

  deptho_ti-u-hxy-sea:
    table: fx
    units: "m"
    long_name: Sea Floor Depth
    standard_name: depth_below_sea_level
    dims: [yh, xh]
    regrid_method: conservative
    sources:
      - model_var: deptho

  dgw_tavg-u-hxy-lnd:
    table: land
    units: "kg m-2"
    dims: [time, lat, lon]
    sources:
      - model_var: DGW

  drivw_tavg-u-hxy-lnd:
    table: land
    units: "kg m-2"
    dims: [time, lat, lon]
    sources:
      - model_var: DRIVW

  dslw_tavg-u-hxy-lnd:
    table: land
    units: "kg m-2"
    dims: [time, lat, lon]
    sources:
      - model_var: DSLW

  dsn_tavg-u-hxy-lnd:
    table: land
    units: "kg m-2"
    dims: [time, lat, lon]
    sources:
      - model_var: DSN

  dsw_tavg-u-hxy-lnd:
    table: land
    units: "kg m-2"
    dims: [time, lat, lon]
    sources:
      - model_var: DSW

  esn_tavg-u-hxy-lnd:
    table: land
    units: "kg m-2"
    dims: [time, lat, lon]
    sources:
      - model_var: ESN

  evspsbl_tavg-u-hxy-lnd:
    table: land
    units: kg m-2 s-1
    long_name: Evaporation over land
    dims: [time, lat, lon]
    sources:
      - model_var: QVEGT

  evspsbl_tavg-u-hxy-ifs:
    table: ocean
    units: kg m-2 s-1
    long_name: Evaporation over ice free ocean
    dims: [time, latitude, longitude]
    regrid_method: conservative
    sources:
      - model_var: evs

  evspsbl_tavg-u-hxy-u:
    table: atmos
    units: kg m-2 s-1
    long_name: Evaporation
    cell_methods: "time: mean"
    dims: [time, lat, lon]
    regrid_method: conservative
    sources:
      - model_var: QFLX
        scale: -1.0     # flip sign if CESM positive upward

  evspsblpot_tavg-u-hxy-lnd:
    table: land
    units: kg m-2 s-1
    long_name: Potential Evaporation over Land
    dims: [time, lat, lon]
    sources:
      - model_var: QVEGT_POT

  evspsblsoi_tavg-u-hxy-u:
    table: atmos
    units: kg m-2 s-1
    long_name: Water Evaporation from Soil
    dims: [time, lat, lon]
    regrid_method: conservative
    sources:
      - model_var: QSOIL
        scale: -1.0     # flip sign if CESM positive upward

  evspsblsoi_tavg-u-hxy-lnd:
    table: land
    units: kg m-2 s-1
    long_name: Water Evaporation from Soil
    dims: [time, lat, lon]
    sources:
      - model_var: QSOIL

  evspsblveg_tavg-u-hxy-lnd:
    table: land
    units: kg m-2 s-1
    long_name: Water Evaporation from Vegetation
    dims: [time, lat, lon]
    sources:
      - model_var: QVEGE

  evspsblveg_tavg-u-hxy-u:
    table: atmos
    units: kg m-2 s-1
    long_name: Water Evaporation from Vegetation
    dims: [time, lat, lon]
    regrid_method: conservative
    sources:
      - model_var: QVEGE
        scale: -1.0     # flip sign if CESM positive upward

  fFire_tavg-u-hxy-lnd:
    table: land
    units: "kg m-2 s-1"
    dims: [time, lat, lon]
    positive: up
    formula: COL_FIRE_CLOSS/1000.0
    sources:
      - model_var: COL_FIRE_CLOSS

  fHarvest:
    table: land
    units: "kg m-2 s-1"
    dims: [time, lat, lon]
    positive: up
    formula: WOOD_HARVESTC/1000.0
    sources:
      - model_var: WOOD_HARVESTC

  ficeberg_tavg-u-hxy-sea:
    table: ocean
    units: "kg m-2 s-1"
    long_name: "Iceberg Freshwater Flux"
    dims: [time, latitude, longitude]
    regrid_method: conservative
    sources:
      - model_var: ficeberg

  fNVegSoil_tavg-u-hxy-lnd:
    table: land
    units: "kg m-2 s-1"
    dims: [time, lat, lon]
    positive: up
    formula: NVEG_SOIL_CLOSS/1000.0
    sources:
      - model_var: NVEG_SOIL_CLOSS

  gpp_tavg-u-hxy-lnd:
    table: land
    units: "kg m-2 s-1"
    dims: [time, lat, lon]
    formula: GPP/1000.0
    sources:
      - model_var: GPP

  irrDem_tavg-u-hxy-u:
    table: atmos
    units: "kg m-2 s-1"
    long_name: Irrigation Demand
    dims: [time, lat, lon]
    sources:
      - model_var: IRR_DEM

  irrGw_tavg-u-hxy-u:
    table: atmos
    units: "kg m-2 s-1"
    long_name: Groundwater Irrigation
    dims: [time, lat, lon]
    sources:
      - model_var: IRR_GW

  irrLut_tavg-u-hxy-u:
    table: atmos
    units: "kg m-2 s-1"
    long_name: Surface Water Irrigation
    dims: [time, lat, lon]
    sources:
      - model_var: IRR_LUT

  irrSurf_tavg-u-hxy-u:
    table: atmos
    units: "kg m-2 s-1"
    long_name: Irrigation from Surface Water
    dims: [time, lat, lon]
    sources:
      - model_var: IRR_SURF


  hfds_tavg-u-hxy-sea:
    table: ocean
    units: "W m-2"
    positive: down
    dims: [time, latitude, longitude]
    sources:
      - model_var: hfds

  hfls_tavg-u-hxy-u:
    table: atmos
    units: "W m-2"
    dims: [time, lat, lon]
    positive: up
    sources:
      - model_var: LHFLX

  hfsnthermds_tavg-u-hxy-sea:
    table: ocean
    units: "W m-2"
    long_name: "Latent Heat to melt frozen Precipitation"
    dims: [time, olevel, latitude, longitude]
    regrid_method: conservative
    sources:
      - model_var: hfsnthermds

  hfss_tavg-u-hxy-u:
    table: atmos
    units: "W m-2"
    dims: [time, lat, lon]
    positive: up
    sources:
      - model_var: SHFLX

  hurs_tavg-al-hxy-u:
    table: atmos
    units: "%"
    dims: [time, lev, lat, lon]
    levels:
      name: standard_hybrid_sigma
      units: "1"
      src_axis_name: lev
      src_axis_bnds: ilev
    sources:
      - model_var: RELHUM

  hur_tavg-p19-hxy-air:
    table: atmos
    units: "%"
    dims: [time, plev, lat, lon]
    levels:
      name: plev19
      units: Pa
    sources:
      - model_var: RELHUM

  hurs_tavg-u-hxy-u:
    table: atmos
    units: "%"
    dims: [time, lat, lon]
    sources:
      - model_var: RHREFHT

  hus_tavg-al-hxy-u:
    table: atmos
    units: "kg kg-1"
    dims: [time, lev, lat, lon]
    levels:
      name: standard_hybrid_sigma
      units: "1"
      src_axis_name: lev
      src_axis_bnds: ilev
    sources:
      - model_var: Q

  hus_tavg-p19-hxy-u:
    table: atmos
    units: "kg kg-1"
    dims: [time, plev, lat, lon]
    levels:
      name: plev19
      units: Pa
    sources:
      - model_var: Q

  huss_tavg-h2m-hxy-u:
    table: atmos
    units: "1"
    long_name: Near-Surface Specific Humidity
    dims: [time, lat, lon]
    regrid_method: bilinear
    sources:
      - model_var: QREFHT

  lai_tavg-u-hxy-lnd:
    table: land
    units: "1"
    dims: [time, lat, lon]
    sources:
      - model_var: TLAI

  mlotst_tavg-u-hxy-sea:
    table: ocean
    units: "m"
    long_name: "Ocean Mixed Layer Thickness Defined by Sigma T"
    dims: [time, latitude, longitude]
    sources:
      - model_var: mlotst

  mrfso_tavg-u-hxy-lnd:
    table: landIce
    units: kg m-2
    dims: [time, lat, lon]
    formula: verticalsum(SOILICE, capped_at=5000)
    sources:
      - model_var: SOILICE

  mrro_tavg-u-hxy-lnd:
    table: land
    units: kg m-2 s-1
    dims: [time, lat, lon]
    sources:
      - model_var: QRUNOFF

  mrrob_tavg-u-hxy-lnd:
    table: land
    units: kg m-2 s-1
    dims: [time, lat, lon]
    sources:
      - model_var: QBURDRUNOFF

  mrros_tavg-u-hxy-lnd:
    table: land
    units: kg m-2 s-1
    dims: [time, lat, lon]
    sources:
      - model_var: QOVER

  mrsfl_tavg-sl-hxy-lnd:
    table: land
    units: kg m-2
    dims: [time, sdepth, lat, lon]
    sources:
      - model_var: SOILMOIST

  mrsll_tavg-sl-hxy-lnd:
    table: land
    units: kg m-2
    dims: [time, sdepth, lat, lon]
    sources:
      - model_var: SOILLIQ

  mrso_tavg-u-hxy-lnd:
    table: land
    units: kg m-2
    dims: [time, lat, lon]
    formula: verticalsum(SOILICE + SOILLIQ, capped_at=5000)
    sources:
      - model_var: SOILICE
      - model_var: SOILLIQ

  mrsol_tavg-sl-hxy-lnd:
    table: land
    units: kg m-2
    dims: [time, sdepth, lat, lon]
    formula: SOILLIQ + SOILICE
    sources:
      - model_var: SOILLIQ
      - model_var: SOILICE

  mrsol_tavg-d10cm-hxy-lnd:
    table: land
    units: kg m-2
    dims: [time, lat, lon]
    sources:
      - model_var: SOILWATER_10CM

  nbp_tavg-u-hxy-lnd:
    table: land
    units: "kg m-2 s-1"
    dims: [time, lat, lon]
    formula: NBP/1000.0
    positive: down
    sources:
      - model_var: NBP

  npp_tavg-u-hxy-lnd:
    table: land
    units: "kg m-2 s-1"
    dims: [time, lat, lon]
    formula: NPP/1000.0
    positive: down
    sources:
      - model_var: NPP

  nVeg_tavg-u-hxy-lnd:
    table: land
    units: "kg m-2"
    dims: [time, lat, lon]
    formula: (WOOD_C + LEAF_C + ROOT_C)/1000.0
    sources:
      - model_var: WOOD_C
      - model_var: LEAF_C
      - model_var: ROOT_C

  pastureFracC3_tavg-u-hxy-u:
    table: land
    units: "1"
    dims: [time, lat, lon]
    sources:
      - model_var: PASTURE_C3_FRAC

  pastureFracC4_tavg-u-hxy-u:
    table: land
    units: "1"
    dims: [time, lat, lon]
    sources:
      - model_var: PASTURE_C4_FRAC

  pr_tavg-u-hxy-u:
    table: atmos
    units: kg m-2 s-1
    long_name: Precipitation
    standard_name: precipitation_flux
    cell_methods: "time: mean"
    dims: [time, lat, lon]
    regrid_method: conservative
    sources:
      - model_var: PRECT
        scale: 1000.0   # convert from m/s to kg m-2 s-1 if needed

  prc_tavg-u-hxy-u:
    table: atmos
    units: "kg m-2 s-1"
    dims: [time, lat, lon]
    # PRECC is in m s-1 (water equivalent) → convert to kg m-2 s-1
    formula: PRECC * 1000.0
    sources:
      - model_var: PRECC

  prsn_tavg-u-hxy-u:
    table: atmos
    units: "kg m-2 s-1"
    dims: [time, lat, lon]
    # PRECSC/PRECSL are snowfall rates in m s-1 (water equiv) → convert to kg m-2 s-1
    formula: (PRECSC + PRECSL) * 1000.0
    sources:
      - model_var: PRECSC
      - model_var: PRECSL

  prveg_tavg-u-hxy-lnd:
    table: land
    units: "kg m-2 s-1"
    dims: [time, lat, lon]
    sources:
      - model_var: QINTR

  prw_tavg-u-hxy-u:
    table: atmos
    units: "kg m-2"
    dims: [time, lat, lon]
    sources:
      - model_var: TMQ

  psl_tavg-u-hxy-u:
    table: atmos
    units: Pa
    long_name: Sea Level Pressure
    cell_methods: "time: mean"
    dims: [time, lat, lon]
    regrid_method: bilinear
    sources:
      - model_var: PSL

  ps_tavg-u-hxy-u:
    table: atmos
    units: Pa
    long_name: Surface Air Pressure
    cell_methods: "time: mean"
    dims: [time, lat, lon]
    regrid_method: bilinear
    sources:
      - model_var: PS

  ra_tavg-u-hxy-lnd:
    table: land
    units: "kg m-2 s-1"
    dims: [time, lat, lon]
    positive: up
    formula: AR/1000.0
    sources:
      - model_var: AR

  rh_tavg-u-hxy-lnd:
    table: land
    units: "kg m-2 s-1"
    dims: [time, lat, lon]
    positive: up
    formula: HR/1000.0
    sources:
      - model_var: HR

  rlds_tavg-u-hxy-u:
    table: atmos
    units: "W m-2"
    dims: [time, lat, lon]
    positive: up
    sources:
      - model_var: FLDS

  rldscs_tavg-u-hxy-u:
    table: atmos
    units: "W m-2"
    dims: [time, lat, lon]
    positive: up
    formula: FLDS + FLNS - FLNSC
    sources:
      - model_var: FLDS
      - model_var: FLNS
      - model_var: FLNSC

  rlus_tavg-u-hxy-u:
    table: atmos
    units: "W m-2"
    dims: [time, lat, lon]
    positive: up
    formula: FLDS + FLNS
    sources:
      - model_var: FLDS
      - model_var: FLNS

  rluscs_tavg-u-hxy-u:
    table: atmos
    units: "W m-2"
    dims: [time, lat, lon]
    positive: up
    sources:
      - model_var: FLNSC

  rlut_tavg-u-hxy-u:
    table: atmos
    units: "W m-2"
    dims: [time, lat, lon]
    positive: up
    sources:
      - model_var: FLUT

  rlutcs_tavg-u-hxy-u:
    table: atmos
    units: "W m-2"
    dims: [time, lat, lon]
    positive: up
    sources:
      - model_var: FLUTC

  rsds_tavg-u-hxy-u:
    table: atmos
    units: "W m-2"
    dims: [time, lat, lon]
    positive: up
    sources:
      - model_var: FSDS

  rsds_tavg-u-hxy-lnd:
    table: land
    units: "W m-2"
    dims: [time, lat, lon]
    positive: up
    sources:
      - model_var: FSDS

  rsdscs_tavg-u-hxy-u:
    table: atmos
    units: "W m-2"
    dims: [time, lat, lon]
    positive: up
    sources:
      - model_var: FSDSC

  rsdt_tavg-u-hxy-u:
    table: atmos
    units: "W m-2"
    dims: [time, lat, lon]
    positive: up
    sources:
      - model_var: SOLIN

  rsus_tavg-u-hxy-u:
    table: atmos
    units: "W m-2"
    dims: [time, lat, lon]
    positive: up
    formula: FSDS - FSNS
    sources:
      - model_var: FSDS
      - model_var: FSNS

  rsuscs_tavg-u-hxy-u:
    table: atmos
    units: "W m-2"
    dims: [time, lat, lon]
    positive: up
    formula: FSDSC - FSNSC
    sources:
      - model_var: FSDSC
      - model_var: FSNSC

  rsut_tavg-u-hxy-u:
    table: atmos
    units: "W m-2"
    dims: [time, lat, lon]
    positive: up
    sources:
      - model_var: FLUT

  rsutcs_tavg-u-hxy-u:
    table: atmos
    units: "W m-2"
    dims: [time, lat, lon]
    formula: SOLIN - FSNTOAC
    positive: up
    sources:
      - model_var: SOLIN
      - model_var: FSNTOAC

  sialgc_tavg-u-hxy-si:
    table: seaIce
    units: "kg m-2"
    dims: [time, nj, ni]
    regrid_method: conservative
    sources:
      - model_var: sialgc_d
        freq: day
      - model_var: sialgc
        freq: mon

  siareaacrossline_tavg-u-ht-u:
    table: ocean
    units: "m"
    long_name: "Sea Ice Area Across Line"
    dims: [time, latitude]
    regrid_method: conservative
    sources:
      - model_var: siareaacrossline_d
        freq: day
      - model_var: siareaacrossline
        freq: mon

  siage_tavg-u-hxy-si:
    table: seaIce
    units: "yr"
    dims: [time, nj, ni]
    regrid_method: conservative
    sources:
      - model_var: siage_d
        freq: day
      - model_var: siage
        freq: mon

  sichl_tavg-u-hxy-si:
    table: seaIce
    units: "kg m-2"
    dims: [time, nj, ni]
    regrid_method: conservative
    sources:
      - model_var: sichl_d
        freq: day
      - model_var: sichl
        freq: mon

  sicompstren_tavg-u-hxy-si:
    table: seaIce
    units: "N m-1"
    dims: [time, nj, ni]
    regrid_method: conservative
    sources:
      - model_var: sicompstren_d
        freq: day
      - model_var: sicompstren
        freq: mon

  siconc_tavg-u-hxy-u:
    table: seaIce
    units: "%"
    dims: [time, nj, ni]
    regrid_method: conservative
    sources:
      - model_var: siconc_d
        freq: day
      - model_var: siconc
        freq: mon

  siconc_tavg-u-hxy-si:
    table: seaIce
