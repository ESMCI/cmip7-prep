dataset_overrides: {institution_id: NCAR, nominal_resolution: 100 km, source_id: CESM3}

variables:

  albc_tavg-u-hxy-veg:
    cell_methods: 'area: time: mean where vegetation (weighted by canopy area and
      by downwelling shortwave radiation at the surface)'
    dims: [longitude, latitude, time]
    long_name: Canopy Albedo
    sources: [model_var: N, model_var: A]
    standard_name: canopy_albedo
    table: land
    units: '1'

  areacellg_ti-u-hxy-u:
    cell_methods: 'area: sum'
    dims: [longitude, latitude]
    long_name: Grid-Cell Area for Ice Sheet Variables
    sources: [model_var: area]
    standard_name: cell_area
    table: land
    units: m2

  areacellr_ti-u-hxy-u:
    cell_methods: 'area: sum'
    dims: [longitude, latitude]
    long_name: Grid-Cell Area for River Model Variables
    sources: [model_var: N, model_var: A]
    standard_name: cell_area
    table: land
    units: m2

  baresoilFrac_tavg-u-hxy-u:
    cell_methods: 'area: time: mean'
    dims: [longitude, latitude, time, typebare]
    formula: 'yeartomonth_data(PCT_NAT_PFT[:,0,:,:], time, lat, lon)*yeartomonth_data(PCT_LANDUNIT[:,0,:,:],
      time, lat, lon)  #clm2.h3'
    long_name: Bare Soil Percentage Area Coverage
    sources: [model_var: PCT_NAT_PFT, model_var: PCT_LANDUNIT]
    standard_name: area_fraction
    table: land
    units: '%'

  burntFractionAll_tavg-u-hxy-u:
    cell_methods: 'area: time: mean'
    dims: [longitude, latitude, time, typeburnt]
    formula: chunits(burntFraction(FAREA_BURNED),units='%')
    long_name: Percentage of Entire Grid Cell That Is Covered by Burnt Vegetation
      (All Classes)
    sources: [model_var: FAREA_BURNED]
    standard_name: area_fraction
    table: land
    units: '%'

  c13Land_tavg-u-hxy-lnd:
    cell_methods: 'area: mean where land time: mean'
    dims: [longitude, latitude, time]
    formula: chunits(C13_TOTECOSYSC, units='g/m^2')
    long_name: Mass of 13C in All Terrestrial Carbon Pools
    sources: [model_var: C13_TOTECOSYSC]
    standard_name: mass_content_of_13C_in_vegetation_and_litter_and_soil_and_forestry_and_agricultural_products
    table: land
    units: kg m-2

  c13Litter_tavg-u-hxy-lnd:
    cell_methods: 'area: mean where land time: mean'
    dims: [longitude, latitude, time]
    formula: chunits(C13_TOTLITC, units='g/m^2')
    long_name: Mass of 13C in Litter Pool
    sources: [model_var: C13_TOTLITC]
    standard_name: litter_mass_content_of_13C
    table: land
    units: kg m-2

  c13Soil_tavg-u-hxy-lnd:
    cell_methods: 'area: mean where land time: mean'
    dims: [longitude, latitude, time]
    formula: chunits(C13_TOTSOMC, units='g/m^2')
    long_name: Mass of 13C in Soil Pool
    sources: [model_var: C13_TOTSOMC]
    standard_name: soil_mass_content_of_13C
    table: land
    units: kg m-2

  c13Veg_tavg-u-hxy-lnd:
    cell_methods: 'area: mean where land time: mean'
    dims: [longitude, latitude, time]
    formula: chunits(C13_TOTVEGC, units='g/m^2')
    long_name: Mass of 13C in Vegetation
    sources: [model_var: C13_TOTVEGC]
    standard_name: vegetation_mass_content_of_13C
    table: land
    units: kg m-2

  c14Land_tavg-u-hxy-lnd:
    cell_methods: 'area: mean where land time: mean'
    dims: [longitude, latitude, time]
    formula: chunits(C14_TOTECOSYSC, units='g/m^2')
    long_name: Mass of 14C in All Terrestrial Carbon Pools
    sources: [model_var: C14_TOTECOSYSC]
    standard_name: mass_content_of_14C_in_vegetation_and_litter_and_soil_and_forestry_and_agricultural_products
    table: land
    units: kg m-2

  c14Litter_tavg-u-hxy-lnd:
    cell_methods: 'area: mean where land time: mean'
    dims: [longitude, latitude, time]
    formula: chunits(C14_TOTLITC, units='g/m^2')
    long_name: Mass of 14C in Litter Pool
    sources: [model_var: C14_TOTLITC]
    standard_name: litter_mass_content_of_14C
    table: land
    units: kg m-2

  c14Soil_tavg-u-hxy-lnd:
    cell_methods: 'area: mean where land time: mean'
    dims: [longitude, latitude, time]
    formula: chunits(C14_TOTSOMC, units='g/m^2')
    long_name: Mass of 14C in Soil Pool
    sources: [model_var: C14_TOTSOMC]
    standard_name: soil_mass_content_of_14C
    table: land
    units: kg m-2

  c14Veg_tavg-u-hxy-lnd:
    cell_methods: 'area: mean where land time: mean'
    dims: [longitude, latitude, time]
    formula: chunits(C14_TOTVEGC, units='g/m^2')
    long_name: Mass of 14C in Vegetation
    sources: [model_var: C14_TOTVEGC]
    standard_name: vegetation_mass_content_of_14C
    table: land
    units: kg m-2

  c3PftFrac_tavg-u-hxy-u:
    cell_methods: 'area: time: mean'
    dims: [longitude, latitude, time, typec3pft]
    formula: 'yeartomonth_data(PCT_NAT_PFT[:,1,:,:]+PCT_NAT_PFT[:,2,:,:]+PCT_NAT_PFT[:,3,:,:]+PCT_NAT_PFT[:,4,:,:]+PCT_NAT_PFT[:,5,:,:]+PCT_NAT_PFT[:,6,:,:]+PCT_NAT_PFT[:,7,:,:]+PCT_NAT_PFT[:,8,:,:]+PCT_NAT_PFT[:,9,:,:]+PCT_NAT_PFT[:,10,:,:]+PCT_NAT_PFT[:,11,:,:]+PCT_NAT_PFT[:,12,:,:]+PCT_NAT_PFT[:,13,:,:],
      time, lat, lon)*yeartomonth_data(PCT_LANDUNIT[:,0,:,:], time, lat, lon)+yeartomonth_data(PCT_CFT[:,4,:,:]+PCT_CFT[:,5,:,:]+PCT_CFT[:,8,:,:]+PCT_CFT[:,9,:,:]+PCT_CFT[:,26,:,:]+PCT_CFT[:,27,:,:]+PCT_CFT[:,46,:,:]+PCT_CFT[:,47,:,:]+PCT_CFT[:,62,:,:]+PCT_CFT[:,63,:,:],
      time, lat, lon)*yeartomonth_data(PCT_LANDUNIT[:,1,:,:], time, lat, lon)  #clm2.h3'
    long_name: Percentage Cover by C3 Plant Functional Type
    sources: [model_var: PCT_NAT_PFT, model_var: PCT_LANDUNIT, model_var: PCT_CFT]
    standard_name: area_fraction
    table: land
    units: '%'

  c4PftFrac_tavg-u-hxy-u:
    cell_methods: 'area: time: mean'
    dims: [longitude, latitude, time, typec4pft]
    formula: 'yeartomonth_data(PCT_NAT_PFT[:,14,:,:], time, lat, lon)*yeartomonth_data(PCT_LANDUNIT[:,0,:,:],
      time, lat, lon)+yeartomonth_data(PCT_CFT[:,2,:,:]+PCT_CFT[:,3,:,:]+PCT_CFT[:,52,:,:]+PCT_CFT[:,53,:,:]+PCT_CFT[:,60,:,:]+PCT_CFT[:,61,:,:],
      time, lat, lon)*yeartomonth_data(PCT_LANDUNIT[:,1,:,:], time, lat, lon)  #clm2.h3'
    long_name: Percentage Cover by C4 Plant Functional Type
    sources: [model_var: PCT_NAT_PFT, model_var: PCT_LANDUNIT, model_var: PCT_CFT]
    standard_name: area_fraction
    table: land
    units: '%'

  cGeologicStorage_tavg-u-hxy-u:
    cell_methods: 'area: time: mean'
    dims: [longitude, latitude, time]
    long_name: Carbon Mass in Geologic Storage
    sources: [model_var: N, model_var: A]
    standard_name: carbon_mass_content_of_geological_storage
    table: land
    units: kg m-2

  cLand_tavg-u-hxy-lnd:
    cell_methods: 'area: mean where land time: mean'
    dims: [longitude, latitude, time]
    formula: 'chunits(TOTECOSYSC, units=''g/m^2'')  #clm2.h0'
    long_name: Total Carbon in All Terrestrial Carbon Pools
    sources: [model_var: TOTECOSYSC]
    standard_name: mass_content_of_carbon_in_vegetation_and_litter_and_soil_and_forestry_and_agricultural_products
    table: land
    units: kg m-2

  cLeaf_tavg-u-hxy-lnd:
    cell_methods: 'area: mean where land time: mean'
    dims: [longitude, latitude, time]
    formula: chunits(LEAFC, units='g m-2')
    long_name: Carbon Mass in Leaves
    sources: [model_var: LEAFC]
    standard_name: leaf_mass_content_of_carbon
    table: land
    units: kg m-2

  cLitterCwd_tavg-u-hxy-lnd:
    cell_methods: 'area: mean where land time: mean'
    dims: [longitude, latitude, time]
    formula: chunits(CWDC, units='g/m^2')
    long_name: Carbon Mass in Coarse Woody Debris
    sources: [model_var: CWDC]
    standard_name: wood_debris_mass_content_of_carbon
    table: land
    units: kg m-2

  cLitterLut_tpt-u-hxy-multi:
    cell_methods: 'area: mean where sector time: point'
    dims: [longitude, latitude, landuse, time1]
    formula: 'chunits(CLM_landunit_to_CMIP6_Lut(TOTLITC,''all'',time,lat,lon,grid1d_ixy,grid1d_jxy,grid1d_lon,grid1d_lat,land1d_lon,land1d_lat,land1d_ityplunit,land1d_active,land1d_wtgcell,landUse),
      units=''g/m^2'')  #clm2.h4'
    long_name: Carbon  in Above and Below-Ground Litter Pools on Land-Use Tiles
    sources: [model_var: TOTLITC]
    standard_name: litter_mass_content_of_carbon
    table: land
    units: kg m-2

  cLitterSubSurf_tavg-u-hxy-lnd:
    cell_methods: 'area: mean where land time: mean'
    dims: [longitude, latitude, time]
    long_name: Carbon Mass in Below-Ground Litter
    sources: [model_var: N, model_var: A]
    standard_name: subsurface_litter_mass_content_of_carbon
    table: land
    units: kg m-2

  cLitterSurf_tavg-u-hxy-lnd:
    cell_methods: 'area: mean where land time: mean'
    dims: [longitude, latitude, time]
    long_name: Carbon Mass in Above-Ground Litter
    sources: [model_var: N, model_var: A]
    standard_name: surface_litter_mass_content_of_carbon
    table: land
    units: kg m-2

  cLitter_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    formula: (TOTLITC + CWD_C)/1000.0
    sources: [model_var: TOTLITC, model_var: CWD_C]
    table: land
    units: kg m-2

  cOther_tavg-u-hxy-lnd:
    cell_methods: 'area: mean where land time: mean'
    dims: [longitude, latitude, time]
    formula: chunits(STORVEGC, units='g/m^2')
    long_name: Carbon Mass in Vegetation Components Other than Leaves, Stems and Roots
    sources: [model_var: STORVEGC]
    standard_name: miscellaneous_living_matter_mass_content_of_carbon
    table: land
    units: kg m-2

  cProductLut_tpt-u-hxy-multi:
    cell_methods: 'area: mean where sector time: point'
    dims: [longitude, latitude, landuse, time1]
    long_name: Wood and Agricultural Product Pool Carbon Associated with Land-Use
      Tiles
    sources: [model_var: N, model_var: A]
    standard_name: carbon_mass_content_of_forestry_and_agricultural_products
    table: land
    units: kg m-2

  cProduct_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    formula: (TOTPRODC + CWD_P)/1000.0
    sources: [model_var: TOTPRODC, model_var: CWD_P]
    table: land
    units: kg m-2

  cRoot_tavg-u-hxy-lnd:
    cell_methods: 'area: mean where land time: mean'
    dims: [longitude, latitude, time]
    formula: '(FROOTC+LIVECROOTC+DEADCROOTC)/1000.chunits(FROOTC+LIVECROOTC+DEADCROOTC,
      units=''g m-2'')  #clm2.h0'
    long_name: Carbon Mass in Roots
    sources: [model_var: FROOTC, model_var: LIVECROOTC, model_var: DEADCROOTC]
    standard_name: root_mass_content_of_carbon
    table: land
    units: kg m-2

  cSoilLut_tpt-u-hxy-multi:
    cell_methods: 'area: mean where sector time: point'
    dims: [longitude, latitude, landuse, time1]
    formula: 'chunits(CLM_landunit_to_CMIP6_Lut(TOTSOMC,''all'',time,lat,lon,grid1d_ixy,grid1d_jxy,grid1d_lon,grid1d_lat,land1d_lon,land1d_lat,land1d_ityplunit,land1d_active,land1d_wtgcell,landUse),
      units=''g/m^2'') #clm2.h4'
    long_name: Carbon in Soil Pool on Land-Use Tiles
    sources: [model_var: TOTSOMC]
    standard_name: soil_mass_content_of_carbon
    table: land
    units: kg m-2

  cSoilPools_tavg-u-hxy-lnd:
    cell_methods: 'area: mean where land time: mean'
    dims: [longitude, latitude, soilpools, time]
    formula: 'chunits(get_soilpools(SOIL1C,SOIL2C,SOIL3C,soilpools), units=''g/m^2'')  #clm2.h0'
    long_name: Carbon Mass in Each Model Soil Pool (Summed over Vertical Levels)
    sources: [{model_var: 'SOIL1C, SOIL2C, SOIL3C, soilpools)'}]
    standard_name: soil_mass_content_of_carbon
    table: land
    units: kg m-2

  cSoil_tavg-d100cm-hxy-lnd:
    cell_methods: 'area: mean where land time: mean'
    dims: [longitude, latitude, time, sdepth100cm]
    formula: 'chunits(TOTSOMC_1m, units=''g/m^2'')  #clm2.h0'
    long_name: Carbon Mass in Soil Pool Above 1m Depth
    sources: [model_var: TOTSOMC_1m]
    standard_name: carbon_mass_content_of_soil_layer
    table: land
    units: kg m-2

  cSoil_tavg-sl-hxy-lnd:
    cell_methods: 'area: mean where land time: mean'
    dims: [longitude, latitude, sdepth, time]
    formula: 'chunits(yeartomonth_data3D(SOIL1C_vr, time, lat, lon,levsoi)+yeartomonth_data3D(SOIL2C_vr,
      time, lat, lon,levsoi)+yeartomonth_data3D(SOIL3C_vr, time, lat, lon,levsoi),
      units=''g/m^2'')  #clm2.h3'
    long_name: Carbon Mass in Each Model Soil Level (Summed over All Soil Carbon Pools
      in That Level)
    sources: [model_var: TOTSOMC]
    standard_name: carbon_mass_content_of_soil_layer
    table: land
    units: kg m-2

  cSoil_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    formula: (SOIL1C + SOIL2C + SOIL3C)/1000.0
    sources: [model_var: SOIL1C, model_var: SOIL2C, model_var: SOIL3C]
    table: land
    units: kg m-2

  cStem_tavg-u-hxy-lnd:
    cell_methods: 'area: mean where land time: mean'
    dims: [longitude, latitude, time]
    formula: chunits(LIVESTEMC + DEADSTEMC, units='g/m^2')
    long_name: Carbon Mass in Stem
    sources: [model_var: LIVESTEMC, model_var: DEADSTEMC]
    standard_name: stem_mass_content_of_carbon
    table: land
    units: kg m-2

  cVegLut_tpt-u-hxy-multi:
    cell_methods: 'area: mean where sector time: point'
    dims: [longitude, latitude, landuse, time1]
    formula: 'chunits(CLM_landunit_to_CMIP6_Lut(TOTVEGC,''all'',time,lat,lon,grid1d_ixy,grid1d_jxy,grid1d_lon,grid1d_lat,land1d_lon,land1d_lat,land1d_ityplunit,land1d_active,land1d_wtgcell,landUse),
      units=''g/m^2'') #clm2.h4'
    long_name: Carbon in Vegetation on Land-Use Tiles
    sources: [model_var: TOTVEGC]
    standard_name: vegetation_carbon_content
    table: land
    units: kg m-2

  cVeg_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    formula: (TOTVEGC)/1000.0
    sources: [model_var: TOTVEGC]
    table: land
    units: kg m-2

  cVeg_tavg-u-hxy-ng:
    cell_methods: 'area: time: mean where natural_grasses (mask=grassFrac)'
    dims: [longitude, latitude, time]
    formula: 'chunits(CLM_pft_to_CMIP6_vegtype(TOTVEGC,''grass'',time, lat, lon, grid1d_ixy,
      grid1d_jxy, grid1d_lon,grid1d_lat, land1d_lon, land1d_lat, land1d_ityplunit,pfts1d_lon,
      pfts1d_lat, pfts1d_active, pfts1d_itype_veg,pfts1d_wtgcell, pfts1d_wtlunit),
      units=''g/m^2'')   #clm2.h1'
    long_name: Carbon Mass in Vegetation on Grass Tiles
    sources: [model_var: TOTVEGC]
    standard_name: vegetation_carbon_content
    table: land
    units: kg m-2

  cVeg_tavg-u-hxy-shb:
    cell_methods: 'area: time: mean where shrubs (mask=shrubFrac)'
    dims: [longitude, latitude, time]
    formula: 'chunits(CLM_pft_to_CMIP6_vegtype(TOTVEGC,''shrub'',time, lat, lon, grid1d_ixy,
      grid1d_jxy, grid1d_lon,grid1d_lat, land1d_lon, land1d_lat, land1d_ityplunit,pfts1d_lon,
      pfts1d_lat, pfts1d_active, pfts1d_itype_veg,pfts1d_wtgcell, pfts1d_wtlunit),
      units=''g/m^2'')   #clm2.h2'
    long_name: Carbon Mass in Vegetation on Shrub Tiles
    sources: [model_var: TOTVEGC]
    standard_name: vegetation_carbon_content
    table: land
    units: kg m-2

  cVeg_tavg-u-hxy-tree:
    cell_methods: 'area: time: mean where trees (mask=treeFrac)'
    dims: [longitude, latitude, time]
    formula: chunits(CLM_pft_to_CMIP6_vegtype(TOTVEGC,'tree',time, lat, lon, grid1d_ixy,
      grid1d_jxy, grid1d_lon,grid1d_lat, land1d_lon, land1d_lat, land1d_ityplunit,pfts1d_lon,
      pfts1d_lat, pfts1d_active, pfts1d_itype_veg,pfts1d_wtgcell, pfts1d_wtlunit),
      units='g/m^2')
    long_name: Carbon Mass in Vegetation on Tree Tiles
    sources: [model_var: TOTVEGC]
    standard_name: vegetation_carbon_content
    table: land
    units: kg m-2

  cnc_tavg-u-hxy-u:
    cell_methods: 'area: time: mean'
    dims: [longitude, latitude, time]
    long_name: Canopy Covered Area Percentage
    sources: [model_var: N, model_var: A]
    standard_name: vegetation_area_fraction
    table: land
    units: '%'

  cropFracC3_tavg-u-hxy-u:
    dims: [time, lat, lon]
    sources: [model_var: CROP_C3_FRAC]
    table: land
    units: '1'

  cropFracC4_tavg-u-hxy-u:
    dims: [time, lat, lon]
    sources: [model_var: CROP_C4_FRAC]
    table: land
    units: '1'

  cropFrac_tavg-u-hxy-u:
    cell_methods: 'area: time: mean'
    dims: [longitude, latitude, time, typecrop]
    formula: PCT_LANDUNIT[:,1,:,:]
    long_name: Percentage Crop Cover
    sources: [model_var: PCT_LANDUNIT]
    standard_name: area_fraction
    table: land
    units: '%'

  dcw_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    sources: [model_var: DCW]
    table: land
    units: kg m-2

  depthl_ti-u-hxy-u:
    cell_methods: 'area: mean'
    dims: [longitude, latitude]
    long_name: Depth of Lake Below the Surface
    sources: [model_var: N, model_var: A]
    standard_name: depth
    table: land
    units: m

  depthsl_ti-u-hxy-u:
    cell_methods: 'area: mean'
    dims: [longitude, latitude]
    long_name: Total (Cumulative) Thickness of All Soil Layers
    sources: [model_var: N, model_var: A]
    standard_name: depth
    table: land
    units: m

  dgw_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    sources: [model_var: DGW]
    table: land
    units: kg m-2

  drivw_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    sources: [model_var: DRIVW]
    table: land
    units: kg m-2

  dslw_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    sources: [model_var: DSLW]
    table: land
    units: kg m-2

  dsn_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    sources: [model_var: DSN]
    table: land
    units: kg m-2

  dsw_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    sources: [model_var: DSW]
    table: land
    units: kg m-2

  esn_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    sources: [model_var: ESN]
    table: land
    units: kg m-2

  evspsbl_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    long_name: Evaporation over land
    sources: [model_var: QVEGT]
    table: land
    units: kg m-2 s-1

  evspsblpot_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    long_name: Potential Evaporation over Land
    sources: [model_var: QVEGT_POT]
    table: land
    units: kg m-2 s-1

  evspsblsoi_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    long_name: Water Evaporation from Soil
    sources: [model_var: QSOIL]
    table: land
    units: kg m-2 s-1

  evspsblveg_tavg-u-hxy-lnd:
    dims: [time, lat, lon]
    long_name: Water Evaporation from Vegetation
    sources: [model_var: QVEGE]
    table: land
    units: kg m-2 s-1

  fAnthDisturb_tavg-u-hxy-lnd:
    cell_methods: 'area: mean where land time: mean'
    dims: [longitude, latitude, time]
    formula: chunits(LAND_USE_FLUX-CROPPROD1C_LOSS, units='g m-2 s-1')
    long_name: Carbon Mass Flux from Vegetation, Litter or Soil Pools into the Atmosphere
      Due to any Human Activity [kgC m-2 s-1]
    sources: [model_var: LAND_USE_FLUX, model_var: CROPPROD1C_LOSS]
    standard_name: surface_upward_mass_flux_of_carbon_dioxide_expressed_as_carbon_due_to_anthropogenic_land_use_or_land_cover_change_excluding_forestry_and_agricultural_products
    table: land
    units: kg m-2 s-1

  fBNF_tavg-u-hxy-lnd:
