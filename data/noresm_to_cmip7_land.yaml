dataset_overrides:
  institution_id: NCC
  nominal_resolution: 200 km
  source_id: NorESM3

variables:

  baresoilFrac_tavg-u-hxy-u:
    description: Percentage of entire grid cell  that is covered by bare soil.
    dims: [lon, lat, time, typebare]
    formula: (1-FATES_AREA_PLANTS)*FATES_FRACTION*100
    sources: [model_var: FATES_AREA_PLANTS, model_var: FATES_FRACTION]
    table: land
    units: '%'

  burntFractionAll_tavg-u-hxy-u:
    description: Percentage of grid cell burned due to all fires including natural
      and anthropogenic fires and those associated with anthropogenic land use change
    dims: [lon, lat, time, typeburnt]
    formula: (FATES_BURNFRAC *3600*24*30*100)*FATES_FRACTION
    sources: [model_var: FATES_BURNFRAC, model_var: FATES_FRACTION]
    table: land
    units: '%'

  c3PftFrac_tavg-u-hxy-u:
    description: Percentage of entire grid cell  that is covered by C3 PFTs (including
      grass, crops, and trees).
    dims: [lon, lat, time, typec3pft]
    formula: (FATES_AREA_PLANTS-sumoverpft(FATES_CANOPYCROWNAREA_PF, pftlist=[14],
      dimname='fates_levpft'))*FATES_FRACTION*100
    sources: [model_var: FATES_AREA_PLANTS, model_var: FATES_CANOPYCROWNAREA_PF,
      model_var: FATES_FRACTION]
    table: land
    units: '%'

  c4PftFrac_tavg-u-hxy-u:
    description: Percentage of entire grid cell  that is covered by C4 PFTs (including
      grass and crops).
    dims: [lon, lat, time, typec4pft]
    formula: sumoverpft(FATES_CANOPYCROWNAREA_PF, pftlist=[14], dimname='fates_levpft')*FATES_FRACTION
    sources: [model_var: FATES_CANOPYCROWNAREA_PF, model_var: FATES_FRACTION]
    table: land
    units: '%'

  cLitterCwd_tavg-u-hxy-lnd:
    description: '"Content" indicates a quantity per unit area. "Wood debris" means
      dead organic matter composed of coarse wood. It is distinct from fine litter.
      The precise distinction between "fine" and "coarse" is model dependent.'
    dims: [lon, lat, time]
    formula: (FATES_LITTER_BG_CWD_EL)*FATES_FRACTION
    sources: [model_var: FATES_LITTER_BG_CWD_EL, model_var: FATES_FRACTION]
    table: land
    units: kg m-2

  cLitterSubSurf_tavg-u-hxy-lnd:
    description: subsurface litter pool fed by root inputs.
    dims: [lon, lat, time]
    formula: (FATES_LITTER_BG_FINE_EL + FATES_LITTER_BG_CWD_EL)*FATES_FRACTION
    sources: [model_var: FATES_LITTER_BG_FINE_EL, model_var: FATES_LITTER_BG_CWD_EL,
      model_var: FATES_FRACTION]
    table: land
    units: kg m-2

  cSoil_tavg-d100cm-hxy-lnd:
    description: Report missing data over ocean grid cells. For fractional land report
      value averaged over the land fraction.
    dims: [lon, lat, time, sdepth100cm]
    sources: [model_var: TOTSOMC_1m]
    table: land
    units: kg m-2

  cVeg_tavg-u-hxy-lnd:
    description: Carbon mass per unit area in vegetation.
    dims: [lon, lat, time]
    formula: FATES_VEGC *FATES_FRACTION
    sources: [model_var: FATES_VEGC, model_var: FATES_FRACTION]
    table: land
    units: kg m-2

  cnc_tavg-u-hxy-u:
    description: Canopy covered fraction
    dims: [lon, lat, time]
    formula: (FATES_AREA_PLANTS)*FATES_FRACTION
    sources: [model_var: FATES_AREA_PLANTS, model_var: FATES_FRACTION]
    table: land
    units: '%'

  evspsblsoi_tavg-u-hxy-u:
    description: Water evaporation flux from soil but for daily averages i.e., the
      evspsblsoi variable, which is only currently defined for monthly averages
    dims: [lon, lat, time]
    positive: up
    sources: [model_var: QSOIL]
    table: land
    units: kg m-2 s-1

  evspsblveg_tavg-u-hxy-lnd:
    description: the canopy evaporation+sublimation (if present in model).
    dims: [lon, lat, time]
    sources: [model_var: QVEGE]
    table: land
    units: kg m-2 s-1

  evspsblveg_tavg-u-hxy-u:
    description: Evaporation from canopy
    dims: [lon, lat, time]
    positive: up
    sources: [model_var: QVEGE]
    table: land
    units: kg m-2 s-1

  fBNF_tavg-u-hxy-lnd:
    description: The fixation (uptake of nitrogen gas directly from the atmosphere)
      of nitrogen due to biological processes.
    dims: [lon, lat, time]
    sources: [model_var: NFIX_TO_SMINN]
    table: land
    units: kg m-2 s-1

  fCLandToOcean_tavg-u-hxy-lnd:
    description: leached carbon etc that goes into run off or river routing and finds
      its way into ocean should be reported here.
    dims: [lon, lat, time]
    formula: SOM_C_LEACHED *1000
    sources: [model_var: SOM_C_LEACHED]
    table: land
    units: kg m-2 s-1

  fDeforestToProduct_tavg-u-hxy-lnd:
    description: When land use change results in deforestation of natural vegetation
      (trees or grasslands) then natural biomass is removed. The treatment of deforested
      biomass differs significantly across models, but it should be straight-forward
      to compare deforested biomass across models.
    dims: [lon, lat, time]
    formula: DWT_CROPPROD1C_GAIN+DWT_WOODPRODC_GAIN
    sources: [model_var: DWT_CROPPROD1C_GAIN, model_var: DWT_WOODPRODC_GAIN]
    table: land
    units: kg m-2 s-1

  fFire_tavg-u-hxy-lnd:
    description: CO2 emissions (expressed as a carbon mass flux) from natural fires
      + human ignition fires as calculated by the fire module of the DGVM, but excluding
      any CO2 flux from fire included in fLuc, defined below (CO2 Flux to Atmosphere
      from Land Use Change).
    dims: [lon, lat, time]
    formula: (FATES_FIRE_CLOSS)*FATES_FRACTION
    positive: up
    sources: [model_var: FATES_FIRE_CLOSS, model_var: FATES_FRACTION]
    table: land
    units: kg m-2 s-1

  fNOx_tavg-u-hxy-lnd:
    description: The surface called "surface" means the lower boundary of the atmosphere.
      "Upward" indicates a vector component which is positive when directed upward
      (negative downward). In accordance with common usage in geophysical disciplines,
      "flux" implies per unit area, called "flux density" in physics. The phrase "expressed_as"
      is used in the construction A_expressed_as_B, where B is a chemical constituent
      of A. It means that the quantity indicated by the standard name is calculated
      solely with respect to the B contained in A, neglecting all other chemical constituents
      of A. "Nox" means a combination of two radical species containing nitrogen and
      oxygen NO+NO2. "Vegetation" means any living plants e.g. trees, shrubs, grass.
      "Litter" is dead plant material in or above the soil.
    dims: [lon, lat, time]
    formula: SMIN_NO3_LEACHED+SMIN_NO3_RUNOFF
    sources: [model_var: SMIN_NO3_LEACHED, model_var: SMIN_NO3_RUNOFF]
    table: land
    units: kg m-2 s-1

  fNgasFire_tavg-u-hxy-lnd:
    description: Flux of Nitrogen from the land into the atmosphere due to fire
    dims: [lon, lat, time]
    sources: [model_var: COL_FIRE_NLOSS]
    table: land
    units: kg m-2 s-1

  fNloss_tavg-u-hxy-lnd:
    description: Not all models split losses into gaseous and leaching
    dims: [lon, lat, time]
    formula: DENIT+ F_N2O_NIT+ SMIN_NO3_LEACHED + SMIN_NO3_RUNOFF
    sources: [model_var: DENIT, model_var: F_N2O_NIT, model_var: SMIN_NO3_LEACHED,
      model_var: SMIN_NO3_RUNOFF]
    table: land
    units: kg m-2 s-1

  fProductDecomp_tavg-u-hxy-lnd:
    description: Flux of CO2 from product pools into the atmosphere. Examples of "forestry
      and agricultural products" are paper, cardboard, furniture, timber for construction,
      biofuels and food for both humans and livestock. Models that simulate land use
      changes have one or more pools of carbon that represent these products in order
      to conserve carbon and allow its eventual release into the atmosphere, for example,
      when the products decompose in landfill sites.
    dims: [lon, lat, time]
    formula: TOT_WOODPRODC_LOSS+CROPPROD1C_LOSS
    sources: [model_var: TOT_WOODPRODC_LOSS, model_var: CROPPROD1C_LOSS]
    table: land
    units: kg m-2 s-1

  fVegFire_tavg-u-hxy-lnd:
    description: Required for unambiguous separation of vegetation and soil + litter
      turnover times, since total fire flux draws from both sources
    dims: [lon, lat, time]
    formula: (FATES_FIRE_CLOSS)*FATES_FRACTION
    sources: [model_var: FATES_FIRE_CLOSS, model_var: FATES_FRACTION]
    table: land
    units: kg m-2 s-1

  fVegLitterMortality_tavg-u-hxy-lnd:
    description: needed to separate changing vegetation C turnover times resulting
      from changing allocation versus changing mortality
    dims: [lon, lat, time]
    formula: (FATES_MORTALITY_CFLUX_CANOPY+FATES_MORTALITY_CFLUX_USTORY)*FATES_FRACTION
    sources: [model_var: FATES_MORTALITY_CFLUX_CANOPY, model_var: FATES_MORTALITY_CFLUX_USTORY,
      model_var: FATES_FRACTION]
    table: land
    units: kg m-2 s-1

  fVegLitterSenescence_tavg-u-hxy-lnd:
    description: needed to separate changing vegetation C turnover times resulting
      from changing allocation versus changing mortality
    dims: [lon, lat, time]
    formula: (FATES_LITTER_IN_EL-FATES_MORTALITY_CFLUX_CANOPY+FATES_MORTALITY_CFLUX_USTORY)*FATES_FRACTION
    sources: [model_var: FATES_LITTER_IN_EL, model_var: FATES_MORTALITY_CFLUX_CANOPY,
      model_var: FATES_MORTALITY_CFLUX_USTORY, model_var: FATES_FRACTION]
    table: land
    units: kg m-2 s-1

  fVegLitter_tavg-u-hxy-lnd:
    description: In accordance with common usage in geophysical disciplines, "flux"
      implies per unit area, called "flux density" in physics. "Vegetation" means
      any living plants e.g. trees, shrubs, grass. "Litter" is dead plant material
      in or above the soil. It is distinct from coarse wood debris. The precise distinction
      between "fine" and "coarse" is model dependent. The sum of the quantities with
      standard names mass_flux_of_carbon_into_litter_from_vegetation_due_to_mortality
      and mass_flux_of_carbon_into_litter_from_vegetation_due_to_senescence is mass_flux_of_carbon_into_litter_from_vegetation.
    dims: [lon, lat, time]
    formula: (FATES_LITTER_IN_EL)*FATES_FRACTION
    sources: [model_var: FATES_LITTER_IN_EL, model_var: FATES_FRACTION]
    table: land
    units: kg m-2 s-1
  fracInLut_tsum-u-hxy-lnd:
    description: Cumulative percentage transitions over the year; note that percentage
      should be reported as a percentage of atmospheric grid cell
    dims: [lon, lat, landuse, time]
    formula: (FATES_TRANSITION_MATRIX_LULU)*FATES_FRACTION
    sources: [model_var: FATES_TRANSITION_MATRIX_LULU, model_var: FATES_FRACTION]
    table: land
    units: '%'
  fracOutLut_tsum-u-hxy-lnd:
    description: Cumulative percentage transitions over the year; note that percentage
      should be reported as percentage of atmospheric grid cell
    dims: [lon, lat, landuse, time]
    formula: (FATES_TRANSITION_MATRIX_LULU)*FATES_FRACTION
    sources: [model_var: FATES_TRANSITION_MATRIX_LULU, model_var: FATES_FRACTION]
    table: land
    units: '%'

  gppLut_tavg-u-hxy-multi:
    description: The rate of synthesis of biomass from inorganic precursors by autotrophs
      ("producers") expressed as the mass of carbon which it contains. For example,
      photosynthesis in plants or phytoplankton. The producers also respire some of
      this biomass and the difference is referred to as the net primary production.
      Reported on land-use tiles.
    dims: [lon, lat, landuse, time]
    formula: (FATES_GPP_LU)*FATES_FRACTION
    sources: [model_var: FATES_GPP_LU, model_var: FATES_FRACTION]
    table: land
    units: kg m-2 s-1

  gpp_tavg-u-hxy-lnd:
    description: The rate of synthesis of biomass from inorganic precursors by autotrophs
      ("producers") expressed as the mass of carbon which it contains. For example,
      photosynthesis in plants or phytoplankton. The producers also respire some of
      this biomass and the difference is referred to as the net primary production.
    dims: [lon, lat, time]
    formula: (FATES_GPP)*FATES_FRACTION
    sources: [model_var: FATES_GPP, model_var: FATES_FRACTION]
    table: land
    units: kg m-2 s-1

  gpp_tavg-u-hxy-ng:
    description: Total GPP of grass in the grid cell
    dims: [lon, lat, time]
    formula: (sumoverpft(FATES_GPP_PF, pftlist=[12, 13, 14], dimname='fates_levpft'))*FATES_FRACTION
    sources: [model_var: FATES_GPP_PF, model_var: FATES_FRACTION]
    table: land
    units: kg m-2 s-1

  gpp_tavg-u-hxy-shb:
    description: Total GPP of shrubs in the grid cell
    dims: [lon, lat, time]
    formula: (sumoverpft(FATES_GPP_PF, pftlist=[7, 8, 9, 10, 11], dimname='fates_levpft'))*FATES_FRACTION
    sources: [model_var: FATES_GPP_PF, model_var: FATES_FRACTION]
    table: land
    units: kg m-2 s-1

  grassFrac_tavg-u-hxy-u:
    description: Percentage of entire grid cell that is covered by natural grass.
    dims: [lon, lat, time, typenatgr]
    formula: sumoverpft(FATES_CANOPYCROWNAREA_PF, pftlist=[12, 13, 14], dimname='fates_levpft')*FATES_FRACTION*100
    sources: [model_var: FATES_CANOPYCROWNAREA_PF, model_var: FATES_FRACTION]
    table: land
    units: '%'

  lai_tavg-u-hxy-lnd:
    description: A ratio obtained by dividing the total upper leaf surface area of
      vegetation by the (horizontal) surface area of the land on which it grows.
    dims: [lon, lat, time]
    formula: (FATES_LAI)*FATES_FRACTION
    sources: [model_var: FATES_LAI, model_var: FATES_FRACTION]
    table: land
    units: '1'

  landCoverFrac_tavg-u-hxy-u:
    description: The categories may differ from model to model, depending on their  PFT
      definitions.   This may include natural PFTs, anthropogenic PFTs, bare soil,
      lakes, urban areas, etc.   Sum of all should equal the fraction of the grid-cell
      that is land.
    dims: [lon, lat, vegtype, time]
    sources: [model_var: PCT_LANDUNIT]
    table: land
    units: '%'

  mrros_tavg-u-hxy-lnd:
    description: surface_runoff_flux
    dims: [lon, lat, time]
    sources: [model_var: QOVER]
    table: land
    units: kg m-2 s-1

  mrsll_tavg-sl-hxy-lnd:
    description: in each soil layer, the mass of water in liquid phase.  Reported
      as "missing" for grid cells occupied entirely by "sea"
    dims: [lon, lat, sdepth, time]
    sources: [model_var: SOILLIQ]
    table: land
    units: kg m-2

  mrso_tavg-u-hxy-lnd:
    description: the mass per unit area  (summed over all soil layers) of water in
      all phases.
    dims: [lon, lat, time]
    formula: TOTSOILLIQ+TOTSOILICE
    sources: [model_var: TOTSOILLIQ, model_var: TOTSOILICE]
    table: land
    units: kg m-2

  mrsofc_ti-u-hxy-lnd:
    description: 'reported "where land": divide the total water holding capacity of
      all the soil in the grid cell by the land area in the grid cell;  reported as
      "missing" where the land fraction is 0.'
    dims: [lon, lat]
    sources: [model_var: SUCSAT]
    table: land
    units: kg m-2

  mrsol_tavg-d10cm-hxy-lnd:
    description: the mass of water in all phases in a thin surface soil layer.
    dims: [lon, lat, time, sdepth10cm]
    sources: [model_var: SOILWATER_10CM]
    table: land
    units: kg m-2

  mrsol_tavg-sl-hxy-lnd:
    description: in each soil layer, the mass of water in all phases, including ice.  Reported
      as "missing" for grid cells occupied entirely by "sea"
    dims: [lon, lat, sdepth, time]
    formula: SOILLIQ+SOILICE
    sources: [model_var: SOILLIQ, model_var: SOILICE]
    table: land
    units: kg m-2

  mrtws_tavg-u-hxy-lnd:
    description: canopy_and_surface_and_subsurface_water_amount
    dims: [lon, lat, time]
    sources: [model_var: TWS]
    table: land
    units: kg m-2

  nMineralNH4_tavg-u-hxy-lnd:
    description: SUM of ammonium over all soil layers
    dims: [lon, lat, time]
    sources: [model_var: SMIN_NH4]
    table: land
    units: kg m-2

  nMineralNO3_tavg-u-hxy-lnd:
    description: SUM of nitrate over all soil layers
    dims: [lon, lat, time]
    sources: [model_var: SMIN_NO3]
    table: land
    units: kg m-2

  nMineral_tavg-u-hxy-lnd:
    description: SUM of ammonium, nitrite, nitrate, etc over all soil layers
    dims: [lon, lat, time]
    sources: [model_var: SMINN]
    table: land
    units: kg m-2

  nSoil_tavg-u-hxy-lnd:
    description: Report missing data over ocean grid cells. For fractional land report
      value averaged over the land fraction.
    dims: [lon, lat, time]
    formula: SOIL1N+SOIL2N+SOIL3N
    sources: [model_var: SOIL1N, model_var: SOIL2N, model_var: SOIL3N]
    table: land
    units: kg m-2

  nbp_tavg-u-hxy-lnd:
    description: This is the net mass flux of carbon between land and atmosphere calculated
      as photosynthesis MINUS the sum of  plant and soil respiration, carbonfluxes  from
      fire, harvest, grazing  and land use change. Positive flux  is into the land.
    dims: [lon, lat, time]
    formula: FCO2 /1000 / conv
    positive: down
    sources: [model_var: FCO2, model_var: conv]
    table: land
    units: kg m-2 s-1

  nep_tavg-u-hxy-lnd:
    description: Net Ecosystem Exchange
    dims: [lon, lat, time]
    sources: [model_var: NEP]
    table: land
    units: kg m-2 s-1

  nppLeaf_tavg-u-hxy-lnd:
    description: This is the rate of carbon uptake by leaves due to NPP
    dims: [lon, lat, time]
    formula: (FATES_LEAF_ALLOC)*FATES_FRACTION
    sources: [model_var: FATES_LEAF_ALLOC, model_var: FATES_FRACTION]
    table: land
    units: kg m-2 s-1

  nppOther_tavg-u-hxy-lnd:
    description: added for completeness with npp_root
    dims: [lon, lat, time]
    formula: (FATES_SEED_ALLOC+FATES_STORE_ALLOC)*FATES_FRACTION
    sources: [model_var: FATES_SEED_ALLOC, model_var: FATES_STORE_ALLOC, model_var: FATES_FRACTION]
    table: land
    units: kg m-2 s-1

  nppStem_tavg-u-hxy-lnd:
    description: added for completeness with npp_root
    dims: [lon, lat, time]
    formula: (FATES_STEM_ALLOC)*FATES_FRACTION
    sources: [model_var: FATES_STEM_ALLOC, model_var: FATES_FRACTION]
    table: land
    units: kg m-2 s-1

  npp_tavg-u-hxy-lnd:
    description: '"Production of carbon" means the production of biomass expressed
      as the mass of carbon which it contains. Net primary production is the excess
      of gross primary production (rate of synthesis of biomass from inorganic precursors)
      by autotrophs ("producers"), for example, photosynthesis in plants or phytoplankton,
      over the rate at which the autotrophs themselves respire some of this biomass.
      "Productivity" means production per unit area. The phrase "expressed_as" is
      used in the construction A_expressed_as_B, where B is a chemical constituent
      of A. It means that the quantity indicated by the standard name is calculated
      solely with respect to the B contained in A, neglecting all other chemical constituents
      of A.'
    dims: [lon, lat, time]
    formula: (FATES_NPP)*FATES_FRACTION
    positive: up
    sources: [model_var: FATES_NPP, model_var: FATES_FRACTION]
    table: land
    units: kg m-2 s-1

  npp_tavg-u-hxy-ng:
    description: Total NPP of grass in the grid cell
    dims: [lon, lat, time]
    formula: (sumoverpft(FATES_NPP_PF, pftlist=[12, 13, 14], dimname='fates_levpft'))*FATES_FRACTION
    sources: [model_var: FATES_NPP_PF, model_var: FATES_FRACTION]
    table: land
    units: kg m-2 s-1

  npp_tavg-u-hxy-shb:
    description: Total NPP of shrubs in the grid cell
    dims: [lon, lat, time]
    formula: (sumoverpft(FATES_NPP_PF, pftlist=[7, 8, 9, 10, 11], dimname='fates_levpft'))*FATES_FRACTION
    sources: [model_var: FATES_NPP_PF, model_var: FATES_FRACTION]
    table: land
    units: kg m-2 s-1

  npp_tavg-u-hxy-tree:
    description: Total NPP of trees in the grid cell
    dims: [lon, lat, time]
    formula: (sumoverpft(FATES_NPP_PF, pftlist=[1, 2, 3, 4, 5, 6], dimname='fates_levpft'))*FATES_FRACTION
    sources: [model_var: FATES_NPP_PF, model_var: FATES_FRACTION]
    table: land
    units: kg m-2 s-1

  orog_tavg-u-hxy-is:
    description: This is needed in case the ice sheet elevation changes in time
    dims: [lon, lat, time]
    sources: [model_var: PHIS]
    table: land
    units: m

  pastureFrac_tavg-u-hxy-u:
    description: fraction of entire grid cell  that is covered by anthropogenic pasture.
    dims: [lon, lat, time, typepasture]
    formula: (sumoverpft(FATES_PATCHAREA_LU, pftlist=[4], dimname='fates_levlanduse'))*FATES_FRACTION
    sources: [model_var: FATES_PATCHAREA_LU, model_var: FATES_FRACTION]
    table: land
    units: '%'

  qgwr_tavg-u-hxy-lnd:
    description: water_flux_from_soil_layer_to_groundwater
    dims: [lon, lat, time]
    sources: [model_var: QCHARGE]
    table: land
    units: kg m-2 s-1

  raLeaf_tavg-u-hxy-lnd:
    description: added for completeness with Ra_root
    dims: [lon, lat, time]
    formula: (FATES_LEAFMAINTAR)*FATES_FRACTION
    sources: [model_var: FATES_LEAFMAINTAR, model_var: FATES_FRACTION]
    table: land
    units: kg m-2 s-1

  raRoot_tavg-u-hxy-lnd:
    description: Total autotrophic respiration from all belowground plant parts.  This
      has benchmarking value because the sum of Rh and root respiration can be compared
      to observations of total soil respiration.
    dims: [lon, lat, time]
    formula: FROOTMAINTAR+CROOTMAINTAR
    sources: [model_var: FROOTMAINTAR, model_var: CROOTMAINTAR]
    table: land
    units: kg m-2 s-1

  ra_tavg-u-hxy-lnd:
    description: Carbon mass flux per unit area into atmosphere due to autotrophic
      respiration on land (respiration by producers) [see rh for heterotrophic production]
    dims: [lon, lat, time]
    formula: FATES_AUTORESP*FATES_FRACTIONTION
    positive: up
    sources: [model_var: FATES_AUTORESP, model_var: FATES_FRACTIONTION]
    table: land
    units: kg m-2 s-1

  ra_tavg-u-hxy-tree:
    description: Total RA of trees in the grid cell
    dims: [lon, lat, time]
    formula: (sumoverpft(FATES_GPP_PF, pftlist=[1, 2, 3, 4, 5, 6], dimname='fates_levpft')-sumoverpft(FATES_NPP_PF,
      pftlist=[1, 2, 3, 4, 5, 6], dimname='fates_levpft'))*FATES_FRACTION
    sources: [model_var: FATES_GPP_PF, model_var: FATES_NPP_PF, model_var: FATES_FRACTION]
    table: land
    units: kg m-2 s-1

  rhSoil_tavg-u-hxy-lnd:
    description: Needed to calculate soil bulk turnover time
    dims: [lon, lat, time]
    formula: SOILC_HR /1000
    sources: [model_var: SOILC_HR]
    table: land
    units: kg m-2 s-1

  rhVgt_tavg-u-hxy-multi:
    description: Carbon mass flux per unit area into atmosphere due to heterotrophic
      respiration on land (respiration by consumers), calculated on vegetation type.
    dims: [lon, lat, vegtype, time]
    formula: (FATES_HET_RESP)*FATES_FRACTION
    sources: [model_var: FATES_HET_RESP, model_var: FATES_FRACTION]
    table: land
    units: kg m-2 s-1

  rh_tavg-u-hxy-lnd:
    description: Carbon mass flux per unit area into atmosphere due to heterotrophic
      respiration on land (respiration by consumers)
    dims: [lon, lat, time]
    formula: FATES_HET_RESP*FATES_FRACTION
    positive: up
    sources: [model_var: FATES_HET_RESP, model_var: FATES_FRACTION]
    table: land
    units: kg m-2 s-1

  rsus_tavg-u-hxy-sn:
    description: Surface Upwelling Shortwave Radiation over the portion of a land
      grid cell covered by snow. Can be used for computation of surface albedo.
    dims: [lon, lat, time]
    formula: SNOFSRVI+SNOFSRVD+SNOFSRNI+SNOFSRND
    positive: up
    sources: [model_var: SNOFSRVI, model_var: SNOFSRVD, model_var: SNOFSRNI,
      model_var: SNOFSRND]
    table: land
    units: W m-2

  sftgif_tavg-u-hxy-u:
    description: Percentage of grid cell covered by land ice (ice sheet, ice shelf,
      ice cap, glacier)
    dims: [lon, lat, time]
    formula: sumoverpft(PCT_LANDUNIT, pftlist=[4], dimname='ltype')
    sources: [model_var: PCT_LANDUNIT]
    table: land
    units: '%'

  sftgif_ti-u-hxy-u:
    description: fraction of grid cell occupied by "permanent" ice (i.e., glaciers).
    dims: [lon, lat]
    formula: sumoverpft(PCT_LANDUNIT, pftlist=[4], dimname='ltype')
    sources: [model_var: PCT_LANDUNIT]
    table: land
    units: '%'

  shrubFrac_tavg-u-hxy-u:
    description: Percentage of entire grid cell  that is covered by shrub.
    dims: [lon, lat, time, typeshrub]
    formula: sumoverpft(FATES_CANOPYCROWNAREA_PF, pftlist=[7, 8, 9, 10, 11], dimname='fates_levpft')
      *FATES_FRACTION*100
    sources: [model_var: FATES_CANOPYCROWNAREA_PF, model_var: FATES_FRACTION]
    table: land
    units: '%'

  slthick_ti-sl-hxy-lnd:
    description: Thickness of Soil Layers
    dims: [lon, lat, sdepth]
    sources: [model_var: DZSOI]
    table: land
    units: m

  srfrad_tavg-u-hxy-u:
    description: Net radiative flux at surface
    dims: [lon, lat, time]
    formula: FSNS-FLNS
    sources: [model_var: FSNS, model_var: FLNS]
    table: land
    units: W m-2

  sw_tavg-u-hxy-lnd:
    description: Total liquid water storage, other than soil, snow or interception
      storage (i.e. lakes, river channel or depression storage).
    dims: [lon, lat, time]
    formula: H2OSFC+ VOLR
    sources: [model_var: H2OSFC, model_var: VOLR]
    table: land
    units: kg m-2

  tran_tavg-u-hxy-lnd:
    description: Transpiration (may include dew formation as a negative flux).
    dims: [lon, lat, time]
    positive: up
    sources: [model_var: QVEGT]
    table: land
    units: kg m-2 s-1

  tran_tavg-u-hxy-u:
    description: Transpiration
    dims: [lon, lat, time]
    sources: [model_var: QVEGT]
    table: land
    units: kg m-2 s-1

  treeFracBdlDcd_tavg-u-hxy-u:
    description: This is the percentage of the entire grid cell that is covered by
      broadleaf deciduous trees.
    dims: [lon, lat, time, typetreebd]
    formula: sumoverpft(FATES_CANOPYCROWNAREA_PF, pftlist=[5, 6], dimname='fates_levpft')*FATES_FRACTION*100
    sources: [model_var: FATES_CANOPYCROWNAREA_PF, model_var: FATES_FRACTION]
    table: land
    units: '%'

  treeFracNdlDcd_tavg-u-hxy-u:
    description: This is the percentage of the entire grid cell that is covered by
      needleleaf deciduous trees.
    dims: [lon, lat, time, typetreend]
    formula: (sumoverpft(FATES_CANOPYCROWNAREA_PF, pftlist=[3], dimname='fates_levpft')*100)*FATES_FRACTION
    sources: [model_var: FATES_CANOPYCROWNAREA_PF, model_var: FATES_FRACTION]
    table: land
    units: '%'

  treeFracNdlEvg_tavg-u-hxy-u:
    description: This is the percentage of the entire grid cell that is covered by
      needleleaf evergreen trees.
    dims: [lon, lat, time, typetreene]
    formula: (sumoverpft(FATES_CANOPYCROWNAREA_PF, pftlist=[2], dimname='fates_levpft')*100)*FATES_FRACTION
    sources: [model_var: FATES_CANOPYCROWNAREA_PF, model_var: FATES_FRACTION]
    table: land
    units: '%'

  treeFrac_tavg-u-hxy-u:
    description: fraction of entire grid cell  that is covered by trees.
    dims: [lon, lat, time, typetree]
    formula: sumoverpft(FATES_CANOPYCROWNAREA_PF, pftlist=[1, 2, 3, 4, 5, 6], dimname='fates_levpft')
      *FATES_FRACTION*100
    sources: [model_var: FATES_CANOPYCROWNAREA_PF, model_var: FATES_FRACTION]
    table: land
    units: '%'

  tsLut_tavg-u-hxy-multi:
    description: Surface temperature (i.e. temperature at which long-wave radiation
      emitted)
    dims: [lon, lat, landuse, time]
    sources: [model_var: TSKIN]
    table: land
    units: K

  tsl_tavg-sl-hxy-lnd:
    description: Temperature of each soil layer.  Reported as "missing" for grid cells
      occupied entirely by "sea".
    dims: [lon, lat, sdepth, time]
    sources: [model_var: TSOI]
    table: land
    units: K

  wetlandCH4prod_tavg-u-hxy-lnd:
    description: Biological emissions (methanogenesis) of methane (NH4) from wetlands
      (areas where water covers the soil, or is present either at or near the surface
      of the soil all year or for varying periods of time during the year, including
      during the growing season).
    dims: [lon, lat, time]
    sources: [model_var: CH4PROD]
    table: land
    units: kg m-2 s-1

  wetlandFrac_tavg-u-hxy-u:
    description: Percentage of grid cell covered by wetland. Report only one year
      if  fixed percentage is used, or time series if values are determined dynamically.
    dims: [lon, lat, time, typewetla]
    sources: [model_var: FINUNDATED]
    table: land
    units: '%'

  wtd_tavg-u-hxy-lnd:
    description: depth_of_soil_moisture_saturation
    dims: [lon, lat, time]
    sources: [model_var: ZWT]
    table: land
    units: m
